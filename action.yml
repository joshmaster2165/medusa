name: "Medusa MCP Security Scanner"
description: "Scan MCP (Model Context Protocol) servers for security vulnerabilities. Integrates with GitHub Security tab via SARIF."
author: "Joshua Bukshpan"

branding:
  icon: "shield"
  color: "purple"

inputs:
  # ── Server Configuration ───────────────────────────────────
  server-command:
    description: >
      Stdio server command to scan (e.g., 'npx -y @modelcontextprotocol/server-everything').
      Use this for scanning a single stdio server.
    required: false

  server-url:
    description: >
      HTTP server URL to scan (e.g., 'https://mcp.example.com/sse').
      Use this for scanning a single HTTP server.
    required: false

  quickscan:
    description: >
      Run quickscan mode which auto-discovers MCP servers from config files.
      Set to 'true' to enable.
    required: false
    default: "false"

  config-file:
    description: >
      Path to MCP config file (e.g., claude_desktop_config.json).
      Used with quickscan mode.
    required: false

  # ── Scan Options ───────────────────────────────────────────
  deep:
    description: >
      Enable AI-powered deep analysis. Requires MEDUSA_API_KEY or
      ANTHROPIC_API_KEY. Set to 'true' to enable.
    required: false
    default: "false"

  severity:
    description: >
      Minimum severity to report. Findings below this level are excluded.
      Options: critical, high, medium, low, info
    required: false
    default: "high"

  categories:
    description: >
      Comma-separated list of check categories to run
      (e.g., 'tool_poisoning,input_validation').
    required: false

  exclude-checks:
    description: >
      Comma-separated list of check IDs to exclude (e.g., 'iv004,tp005').
    required: false

  # ── Output Options ─────────────────────────────────────────
  output-format:
    description: >
      Output format. Options: sarif, json, markdown, html.
      SARIF is recommended for GitHub Security tab integration.
    required: false
    default: "sarif"

  output-file:
    description: >
      Path to write the report file.
    required: false
    default: "medusa-results.sarif"

  upload-sarif:
    description: >
      Automatically upload SARIF results to GitHub Security tab.
      Requires 'security-events: write' permission. Set to 'true' to enable.
    required: false
    default: "true"

  # ── Authentication ─────────────────────────────────────────
  medusa-api-key:
    description: >
      Medusa API key for deep scanning and dashboard uploads.
      Recommended: store as a GitHub secret.
    required: false

  anthropic-api-key:
    description: >
      Anthropic API key for BYOK (Bring Your Own Key) AI scanning.
      Alternative to Medusa API key for deep analysis.
    required: false

  # ── Advanced ───────────────────────────────────────────────
  fail-on:
    description: >
      Fail the action (exit code 1) when findings at this severity
      or above are found. Options: critical, high, medium, low, none.
      Set to 'none' to never fail.
    required: false
    default: "high"

  python-version:
    description: "Python version to use."
    required: false
    default: "3.12"

  version:
    description: >
      Medusa version to install. Use 'latest' for the latest release.
    required: false
    default: "latest"

outputs:
  score:
    description: "Aggregate security score (0-10, lower is better)"
    value: ${{ steps.scan.outputs.score }}

  grade:
    description: "Security grade (A+ through F)"
    value: ${{ steps.scan.outputs.grade }}

  findings-count:
    description: "Total number of findings"
    value: ${{ steps.scan.outputs.findings_count }}

  critical-count:
    description: "Number of critical findings"
    value: ${{ steps.scan.outputs.critical_count }}

  high-count:
    description: "Number of high findings"
    value: ${{ steps.scan.outputs.high_count }}

  sarif-file:
    description: "Path to the generated SARIF file"
    value: ${{ steps.scan.outputs.sarif_file }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Medusa
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          pip install medusa-mcp
        else
          pip install "medusa-mcp==${{ inputs.version }}"
        fi

    - name: Run Medusa Scan
      id: scan
      shell: bash
      env:
        MEDUSA_API_KEY: ${{ inputs.medusa-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        set +e  # Don't exit on non-zero — we handle exit codes ourselves

        # Build the medusa command
        CMD="medusa"
        SCAN_ARGS=""

        if [ "${{ inputs.quickscan }}" = "true" ]; then
          CMD="$CMD quickscan"
          if [ -n "${{ inputs.config-file }}" ]; then
            SCAN_ARGS="$SCAN_ARGS --config '${{ inputs.config-file }}'"
          fi
        elif [ -n "${{ inputs.server-command }}" ]; then
          CMD="$CMD scan --stdio '${{ inputs.server-command }}'"
        elif [ -n "${{ inputs.server-url }}" ]; then
          CMD="$CMD scan --http '${{ inputs.server-url }}'"
        else
          echo "::error::No scan target specified. Set 'server-command', 'server-url', or 'quickscan: true'."
          exit 1
        fi

        # Add scan options
        if [ "${{ inputs.deep }}" = "true" ]; then
          SCAN_ARGS="$SCAN_ARGS --deep"
        fi

        if [ -n "${{ inputs.categories }}" ]; then
          SCAN_ARGS="$SCAN_ARGS --category '${{ inputs.categories }}'"
        fi

        if [ -n "${{ inputs.exclude-checks }}" ]; then
          SCAN_ARGS="$SCAN_ARGS --exclude-checks '${{ inputs.exclude-checks }}'"
        fi

        # Output format
        OUTPUT_FORMAT="${{ inputs.output-format }}"
        OUTPUT_FILE="${{ inputs.output-file }}"
        SCAN_ARGS="$SCAN_ARGS -o $OUTPUT_FORMAT --output-file $OUTPUT_FILE"

        # Also generate JSON for parsing outputs
        JSON_FILE="medusa-results.json"
        CMD_JSON="$CMD $SCAN_ARGS"

        # Run the scan
        echo "::group::Medusa MCP Security Scan"
        eval "$CMD $SCAN_ARGS"
        SCAN_EXIT=$?
        echo "::endgroup::"

        # Also run JSON output for structured data
        eval "$CMD -o json --output-file $JSON_FILE --quiet" 2>/dev/null || true

        # Parse results from JSON if available
        if [ -f "$JSON_FILE" ]; then
          SCORE=$(python3 -c "import json; d=json.load(open('$JSON_FILE')); print(d.get('aggregate_score', 'N/A'))" 2>/dev/null || echo "N/A")
          GRADE=$(python3 -c "import json; d=json.load(open('$JSON_FILE')); print(d.get('aggregate_grade', 'N/A'))" 2>/dev/null || echo "N/A")
          TOTAL=$(python3 -c "import json; d=json.load(open('$JSON_FILE')); print(d.get('total_findings', 0))" 2>/dev/null || echo "0")
          CRITICAL=$(python3 -c "
        import json
        d=json.load(open('$JSON_FILE'))
        print(sum(1 for f in d.get('findings',[]) if f.get('severity')=='critical' and f.get('status')=='fail'))
        " 2>/dev/null || echo "0")
          HIGH=$(python3 -c "
        import json
        d=json.load(open('$JSON_FILE'))
        print(sum(1 for f in d.get('findings',[]) if f.get('severity')=='high' and f.get('status')=='fail'))
        " 2>/dev/null || echo "0")

          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
          echo "findings_count=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "critical_count=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high_count=$HIGH" >> "$GITHUB_OUTPUT"

          # Summary
          echo "### 🐍 Medusa MCP Security Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Grade** | $GRADE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score** | $SCORE / 10.0 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Critical** | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **High** | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total Findings** | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          rm -f "$JSON_FILE"
        fi

        echo "sarif_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

        # Determine failure based on fail-on threshold
        FAIL_ON="${{ inputs.fail-on }}"
        if [ "$FAIL_ON" = "none" ]; then
          exit 0
        fi

        if [ "$FAIL_ON" = "critical" ] && [ "$CRITICAL" -gt 0 ] 2>/dev/null; then
          echo "::error::Found $CRITICAL critical security findings"
          exit 1
        fi

        if [ "$FAIL_ON" = "high" ] && [ "$(( CRITICAL + HIGH ))" -gt 0 ] 2>/dev/null; then
          echo "::error::Found $CRITICAL critical and $HIGH high security findings"
          exit 1
        fi

        exit 0

    - name: Upload SARIF to GitHub Security
      if: inputs.upload-sarif == 'true' && (success() || failure())
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output-file }}
        category: "medusa-mcp"
      continue-on-error: true
