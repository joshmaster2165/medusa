id: MAD-2025-0008
title: "Prompt Injection Embedded in MCP Tool Descriptions"
severity: high
description: |
  MCP tool descriptions can contain prompt injection phrases ("ignore previous
  instructions", "you are now", "system override") that hijack LLM behavior
  when the tool listing is processed. Unlike hidden tags, these injections
  may be in plain text but embedded within legitimate-looking descriptions.
affected_tools_pattern: "Tools with descriptions containing known prompt injection phrases or jailbreak patterns"
attack_vector: |
  An attacker crafts tool descriptions that include prompt injection payloads
  mixed with legitimate documentation. When the LLM processes the tool list,
  these injections override the system prompt or user instructions, redirecting
  the agent's behavior to serve the attacker's goals.
impact: |
  Complete agent compromise, unauthorized actions, data exfiltration,
  bypassing safety guardrails, and executing attacker-controlled instructions
  under the guise of legitimate tool usage.
references:
  - "https://invariantlabs.ai/blog/mcp-security-risks"
  - "https://doyensec.com/resources/Doyensec_MCP_SecurityResearch.pdf"
related_checks:
