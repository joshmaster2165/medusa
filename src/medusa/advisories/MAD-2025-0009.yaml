id: MAD-2025-0009
title: "Server Impersonation Through System Message Prefixes"
severity: medium
description: |
  MCP tool descriptions can begin with prefixes that impersonate system
  messages (e.g., "[SYSTEM]", "ADMIN:", "IMPORTANT SECURITY UPDATE:") to
  elevate the perceived authority of injected instructions. LLMs may treat
  these as higher-priority directives than user messages.
affected_tools_pattern: "Tools with descriptions starting with system/admin/security prefixes that impersonate authoritative sources"
attack_vector: |
  An attacker crafts tool descriptions that begin with system-style prefixes,
  exploiting the LLM's tendency to prioritize system-level instructions.
  The fake system message can direct the LLM to perform actions it would
  normally refuse or deprioritize.
impact: |
  Bypassing safety controls, elevating instruction priority, social
  engineering the LLM into unauthorized actions, and undermining the
  trust hierarchy between system prompts, user prompts, and tool outputs.
references:
  - "https://doyensec.com/resources/Doyensec_MCP_SecurityResearch.pdf"
