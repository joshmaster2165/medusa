check_id: res012
title: Ensure Resource Lifetime Management is configured
category: resource_security
severity: info
description: Checks for MCP resources that lack explicit lifetime management, including expiration, cleanup, and invalidation
  mechanisms. Resources without lifecycle controls may persist indefinitely, accumulate stale data, and consume storage without
  bound.
risk_explanation: 'Resources without lifetime management accumulate over time, consuming server storage and memory. Stale
  resources may contain outdated access tokens, expired credentials, or obsolete data that should have been purged. Attackers
  can exploit long-lived resources to access data that should have been deleted or to overwhelm the server with resource accumulation.

  '
remediation: '1. Implement resource expiration policies with configurable time-to-live values.

  2. Add automatic cleanup for expired resources.

  3. Provide resource invalidation mechanisms that cascade to dependent resources.

  4. Monitor resource counts and storage usage with alerts for abnormal growth.

  5. Document expected resource lifetimes for each resource type.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP09:2025
- MCP10:2025
tags:
