check_id: res007
title: Ensure protection against Resource Caching Security
category: resource_security
severity: medium
description: Checks for MCP resources that are cached without considering security implications. Cached resources may be served
  to unauthorized clients, retain stale access control decisions, or persist sensitive data beyond its intended lifetime in
  cache storage.
risk_explanation: 'Improper caching of resources can serve sensitive content to clients who should not have access after permission
  changes. Cached resources may persist in shared memory or on disk after the user session ends, enabling later extraction.
  Cache poisoning attacks can inject malicious content that is then served to legitimate clients.

  '
remediation: '1. Implement cache-aware access control that validates permissions on cache hits, not just cache misses.

  2. Set appropriate cache expiration times for sensitive resources.

  3. Use per-user cache keys to prevent cross-user cache leaks.

  4. Mark sensitive resources as non-cacheable.

  5. Clear cached resources when access permissions change.'
references:
- https://owasp.org/www-project-mcp-top-10/
