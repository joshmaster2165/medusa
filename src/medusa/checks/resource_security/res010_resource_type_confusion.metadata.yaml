check_id: res010
title: Ensure protection against Resource Type Confusion
category: resource_security
severity: high
description: Checks for MCP resources where the declared MIME type does not match the actual content, or where type validation
  is missing entirely. Type confusion can cause clients to misprocess content, execute code embedded in data files, or misinterpret
  binary data as text.
risk_explanation: 'Resource type confusion enables attackers to serve executable content disguised as benign data types. An
  LLM that receives what it believes is a text document but actually contains encoded executable payloads may process the
  content in unintended ways. Type mismatches can also trigger parser vulnerabilities in clients that handle content based
  on the declared MIME type.

  '
remediation: '1. Validate actual resource content against the declared MIME type using content inspection, not just file extension
  checks.

  2. Reject resources where the content does not match the declared type.

  3. Implement a strict allowlist of permitted resource MIME types.

  4. Sanitize content based on its verified type before serving to clients.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP09:2025
- MCP10:2025
tags:
