check_id: res006
title: Ensure protection against Resource Race Condition
category: resource_security
severity: high
description: Checks for MCP resource handlers that are vulnerable to time-of-check to time-of-use (TOCTOU) race conditions.
  When access control checks and resource reads are not atomic, an attacker can manipulate the resource between the check
  and the read operation.
risk_explanation: 'Race conditions in resource access allow attackers to bypass access controls by timing their requests to
  coincide with legitimate access checks. Symlink races can redirect file-based resources to sensitive files after the access
  check passes. Concurrent modifications can cause data corruption or expose intermediate states containing sensitive information.

  '
remediation: '1. Implement atomic check-and-read operations for all resources.

  2. Use file locks or database transactions to prevent concurrent access race conditions.

  3. Verify resource identity and permissions at the point of use, not just at the point of request.

  4. Use immutable resource snapshots for time-sensitive operations.'
references:
