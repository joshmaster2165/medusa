check_id: res019
title: Ensure Resource Quota is configured
category: resource_security
severity: info
description: Checks the MCP server for that do not enforce quotas on resource creation, storage, or access frequency per client.
  Without quotas, a single client can monopolize server resources, starving other clients and causing denial of service through
  resource exhaustion.
risk_explanation: 'Missing resource quotas enable a single client or attacker to consume all available server resources including
  storage space, memory for active resources, and processing capacity for resource operations. This prevents legitimate clients
  from accessing the server and can cause cascading failures across all connected clients.

  '
remediation: '1. Implement per-client quotas for resource creation count, total storage size, and access frequency.

  2. Set sensible default quotas and allow administrators to configure per-client limits.

  3. Return clear error messages when quotas are exceeded.

  4. Monitor quota usage and alert on clients approaching their limits.'
references:
- https://owasp.org/www-project-mcp-top-10/
