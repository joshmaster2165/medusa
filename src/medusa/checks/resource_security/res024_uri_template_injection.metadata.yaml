check_id: res024
title: Resource URI Template Injection
category: resource_security
severity: high
description: >
  Detects resource URI templates with parameters that could be
  manipulated for path traversal, command execution, or data access
  bypass. URI templates like file:///{path} allow arbitrary file system
  access if the path parameter is not validated server-side. Templates
  combined with sensitive URI schemes pose critical injection risks.
risk_explanation: >
  URI template parameters that are not validated allow an attacker to
  inject arbitrary values that change the resource being accessed. When
  combined with sensitive schemes like file://, exec://, or cmd://, this
  enables arbitrary file read, command execution, or data exfiltration.
  Even with non-sensitive schemes, unvalidated templates can lead to
  server-side request forgery or access to unintended resources.
remediation: >
  Validate all URI template parameters server-side with strict
  allowlists. Avoid using template parameters with sensitive URI schemes
  (file://, exec://, cmd://, data://). Implement path canonicalization
  to prevent traversal attacks. Use parameterized resource lookups
  instead of string interpolation for URI construction. Apply the
  principle of least privilege by restricting accessible paths.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/resources"
owasp_mcp:
  - "MCP06:2025"
tags:
  - resource_security
  - template_injection
  - path_traversal
