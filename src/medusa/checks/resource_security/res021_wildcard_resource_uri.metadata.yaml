check_id: res021
title: Wildcard Resource URI Patterns
category: resource_security
severity: high
description: >
  Detects resource URIs containing glob or wildcard patterns (*, **, ?,
  {...}, [...]) that expose overly broad access to server-side data.
  Wildcard URIs allow clients to match and retrieve large sets of
  resources without explicit enumeration, potentially exposing sensitive
  data that was not intended to be accessible.
risk_explanation: >
  Wildcard patterns in resource URIs allow a client to request an
  unbounded set of resources in a single operation. An attacker can
  exploit these patterns to enumerate and exfiltrate all matching
  resources, bypass per-resource access controls, and discover hidden
  or internal resources that match the wildcard expression. This greatly
  increases the attack surface of the MCP server.
remediation: >
  Replace wildcard URI patterns with explicit resource enumerations or
  parameterized templates that constrain the scope of accessible
  resources. Implement server-side validation that rejects or limits
  wildcard expansion. Apply access control checks to each resolved
  resource individually rather than to the pattern as a whole.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/resources"
owasp_mcp:
  - "MCP06:2025"
tags:
  - resource_security
  - wildcard
  - uri_patterns
