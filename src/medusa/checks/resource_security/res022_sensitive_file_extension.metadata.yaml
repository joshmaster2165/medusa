check_id: res022
title: Sensitive File Extension Exposure
category: resource_security
severity: critical
description: >
  Detects resources that expose files with sensitive extensions such as
  private keys (.key, .pem, .pfx), certificates (.crt, .cer),
  environment files (.env), password stores (.kdbx, .htpasswd), and
  SSH keys (.id_rsa, .id_ed25519). These file types contain credentials
  or cryptographic material that should never be exposed through MCP
  resource endpoints.
risk_explanation: >
  Exposing files with sensitive extensions through MCP resources allows
  any connected client to retrieve private keys, certificates, passwords,
  and other cryptographic material. An attacker can use these to
  impersonate the server, decrypt communications, access other systems,
  or escalate privileges. Even partial exposure of key material can
  compromise the entire security posture of the deployment.
remediation: >
  Remove resources that expose files with sensitive extensions. Implement
  a file extension allowlist that explicitly permits only safe content
  types. If sensitive files must be referenced, use indirect references
  or secure vaults rather than direct file access. Add server-side
  validation that blocks resource creation for sensitive file types.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/resources"
owasp_mcp:
  - "MCP06:2025"
tags:
  - resource_security
  - sensitive_data
  - file_exposure
