check_id: auth004
title: Ensure Authentication is configured for Localhost Binding
category: authentication
severity: high
description: Checks the MCP server for bound to localhost (127.0.0.1 or ::1) over HTTP/SSE without any authentication mechanism.
  While localhost binding limits direct remote access, it does not protect against DNS rebinding attacks, malicious browser
  extensions, or other local processes.
risk_explanation: 'Localhost-bound services without authentication are vulnerable to DNS rebinding attacks where a malicious
  website tricks the user''s browser into making requests to the local MCP server. Because the requests originate from the
  local machine, network-level restrictions are bypassed. Any local process or browser script can also invoke the server''s
  tools without credentials.

  '
remediation: '1. Always require authentication even for localhost-bound MCP servers.

  2. Use bearer tokens, API keys, or OAuth with PKCE.

  3. Additionally, implement CORS restrictions and validate the Host/Origin headers to mitigate DNS rebinding.

  4. Consider binding to a Unix domain socket instead of a TCP port when only local access is needed.'
references:
- https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
- https://en.wikipedia.org/wiki/DNS_rebinding
owasp_mcp:
- MCP07:2025
