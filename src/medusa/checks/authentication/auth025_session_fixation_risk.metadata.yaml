check_id: auth025
title: Ensure protection against Session Fixation
category: authentication
severity: high
description: Checks for session management implementations that do not regenerate session IDs after successful authentication.
  Session fixation allows an attacker to set a known session ID before the user authenticates, then hijack the session after
  authentication elevates its privileges.
risk_explanation: 'An attacker who can set or predict the session ID before authentication gains full access to the authenticated
  session. The attacker waits for the victim to authenticate with the known session ID, then uses that same ID to access the
  MCP server as the victim. This bypasses all authentication mechanisms.

  '
remediation: '1. Regenerate session IDs immediately after successful authentication.

  2. Invalidate the pre-authentication session ID.

  3. Use cryptographically random session identifiers.

  4. Bind sessions to client properties (IP address, user agent) for additional validation.

  5. Implement session timeout and idle expiration.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html
owasp_mcp:
