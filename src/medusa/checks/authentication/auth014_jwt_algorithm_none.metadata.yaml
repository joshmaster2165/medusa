check_id: auth014
title: Ensure protection against JWT Algorithm None attack
category: authentication
severity: critical
description: Checks for JWT tokens that accept the 'none' algorithm, which disables signature verification entirely. An attacker
  can forge arbitrary JWT tokens by setting the algorithm to 'none' and removing the signature, granting themselves any identity
  or permission claims.
risk_explanation: 'The ''none'' algorithm vulnerability allows complete JWT forgery. An attacker creates a token with arbitrary
  claims (admin roles, any user identity) and sets alg to ''none'', bypassing all signature verification. This grants unrestricted
  access to the MCP server with any desired permission level.

  '
remediation: '1. Explicitly allowlist accepted JWT algorithms on the server side.

  2. Never accept the ''none'' algorithm in production.

  3. Use asymmetric algorithms (RS256, ES256) where possible.

  4. Validate the ''alg'' header against the expected algorithm before verification.

  5. Use well-maintained JWT libraries that reject ''none'' by default.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cheatsheetseries.owasp.org/cheatsheets/JSON_Web_Token_for_Java_Cheat_Sheet.html
owasp_mcp:
- MCP01:2025
