check_id: auth027
title: Ensure Password Policy has sufficient strength
category: authentication
severity: medium
description: Checks the MCP server for authentication configurations with password requirements below security standards.
  Weak password policies allow short, simple, or commonly used passwords that are easily guessed or cracked.
risk_explanation: 'Weak passwords are the primary vector for credential-based attacks. Short passwords can be brute-forced
  quickly, common passwords appear in dictionary attacks, and passwords without complexity requirements are easily guessed.
  Password reuse across services amplifies the impact of any single breach.

  '
remediation: '1. Enforce a minimum password length of 12 characters.

  2. Check passwords against known breach databases (e.g.

  3. Have I Been Pwned).

  4. Require a mix of character types.

  5. Implement password strength estimation using algorithms like zxcvbn.

  6. Support passphrase-based authentication as an alternative.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
owasp_mcp:
- MCP01:2025
tags:
- authentication
- password_policy
- credential_strength
- brute_force
