check_id: auth024
title: Ensure Rate Limit on Auth Endpoints are configured
category: authentication
severity: info
description: Checks for authentication endpoints without rate limiting or brute-force protection. Endpoints that accept unlimited
  authentication attempts allow attackers to perform credential stuffing and brute-force attacks.
risk_explanation: 'Without rate limiting, an attacker can attempt thousands of credential combinations per second against
  the authentication endpoint. Credential stuffing attacks using leaked password databases are highly effective against unprotected
  endpoints. Even strong passwords can eventually be brute-forced given unlimited attempts.

  '
remediation: '1. Implement rate limiting on authentication endpoints with progressive delays.

  2. Lock accounts temporarily after a configurable number of failed attempts.

  3. Use CAPTCHA or proof-of-work challenges after repeated failures.

  4. Monitor and alert on abnormal authentication attempt patterns.

  5. Consider IP-based and account-based rate limiting.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cheatsheetseries.owasp.org/cheatsheets/Credential_Stuffing_Prevention_Cheat_Sheet.html
owasp_mcp:
- MCP01:2025
tags:
