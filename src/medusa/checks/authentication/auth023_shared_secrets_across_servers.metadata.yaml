check_id: auth023
title: Ensure secrets are not shared across servers
category: authentication
severity: high
description: Checks for identical credentials or API keys used across multiple MCP servers. Sharing secrets across servers
  means that a compromise of one server exposes all servers using the same credential.
risk_explanation: 'When multiple MCP servers share the same authentication secret, a breach of any single server compromises
  all of them. The attacker gains lateral movement capability across the entire MCP infrastructure. Shared secrets also make
  it impossible to revoke access to a single server without affecting all others.

  '
remediation: '1. Issue unique credentials for each MCP server.

  2. Use a secrets manager to generate and distribute per-server secrets.

  3. Implement credential rotation that can target individual servers.

  4. Audit credential usage to detect shared secrets across server configurations.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
