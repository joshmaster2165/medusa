check_id: auth015
title: Ensure JWT signing key has sufficient strength
category: authentication
severity: high
description: Checks for JWT tokens signed with weak or short symmetric keys that are vulnerable to brute-force or dictionary
  attacks. Short HMAC secrets can be cracked offline, allowing an attacker to forge valid tokens.
risk_explanation: 'Weak JWT signing keys can be brute-forced using tools like jwt_tool or hashcat. Once the signing key is
  recovered, the attacker can forge tokens with arbitrary claims, including admin privileges. Symmetric keys shorter than
  256 bits provide insufficient security against modern brute-force attacks.

  '
remediation: '1. Use signing keys with at least 256 bits of entropy for HMAC algorithms.

  2. Prefer asymmetric algorithms (RS256, ES256) where the private key never leaves the server.

  3. Generate keys using cryptographically secure random generators.

  4. Rotate signing keys periodically and implement key ID (kid) header for key management.'
references:
- https://owasp.org/www-project-mcp-top-10/
