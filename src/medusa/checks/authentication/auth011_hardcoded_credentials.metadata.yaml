check_id: auth011
title: Ensure Credentials in Config is not hardcoded
category: authentication
severity: critical
description: Checks for username and password pairs, API keys, and other credentials hardcoded directly in MCP server configuration
  files or source code. Hardcoded credentials cannot be rotated without code changes and are trivially extracted from the
  codebase.
risk_explanation: 'Hardcoded credentials are shared with anyone who has access to the source code or configuration files.
  They persist in version control history even after removal, are identical across all deployments, and cannot be rotated
  without a code change. A single repository leak exposes all instances of the service.

  '
remediation: '1. Remove all hardcoded credentials from source code and configuration files.

  2. Use environment variables, secrets managers, or secure vault services for credential storage.

  3. Implement credential rotation mechanisms that do not require code changes.

  4. Scan repositories for credential patterns using pre-commit hooks and CI/CD secret scanners.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
