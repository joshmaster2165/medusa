check_id: auth030
title: Detect credential parameters over insecure transport
category: authentication
severity: critical
description: >-
  Detects tools that accept credential-like parameters such as password, token,
  api_key, and secret while the server uses insecure HTTP transport. Transmitting
  credentials over plaintext HTTP enables man-in-the-middle interception of
  sensitive authentication data.
risk_explanation: >-
  When credential parameters are transmitted over unencrypted HTTP connections,
  they are visible to any network observer between the client and server. This
  enables credential theft through network sniffing, man-in-the-middle attacks,
  and session hijacking. The combination of credential acceptance and insecure
  transport is a concrete, exploitable vulnerability.
remediation: >-
  1. Use HTTPS (TLS) for all MCP server transports that handle credentials.
  2. Reject credential parameters when the transport is not encrypted.
  3. Implement transport-level encryption requirements in server configuration.
  4. Use certificate pinning for high-security credential exchanges.
references:
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP09:2025
tags:
  - credential_exposure
  - insecure_transport
  - plaintext_http
  - combinatorial_check
