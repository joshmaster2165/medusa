check_id: ts009
title: Ensure certificates are not self-signed in production
category: transport_security
severity: high
description: Checks the MCP server for using self-signed TLS certificates. Self-signed certificates cannot be verified against
  a trusted certificate authority chain, requiring clients to disable certificate validation and making them vulnerable to
  man-in-the-middle attacks.
risk_explanation: 'Self-signed certificates force clients to either reject the connection or disable certificate validation.
  When validation is disabled, any attacker can present their own self-signed certificate and intercept the connection. Self-signed
  certificates provide encryption but no authentication, meaning the client cannot verify it is communicating with the intended
  server.

  '
remediation: '1. Replace self-signed certificates with certificates from a trusted CA.

  2. Use Let''s Encrypt for free automated certificate issuance.

  3. For internal services, establish a private CA and distribute its root certificate to clients.

  4. If self-signed certificates are temporarily required, implement certificate pinning to prevent MITM attacks.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP03:2025
tags:
- transport_security
- self_signed
- certificate_validation
- mitm
applicable_transports:
- http
