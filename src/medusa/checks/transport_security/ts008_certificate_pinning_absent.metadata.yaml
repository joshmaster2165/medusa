check_id: ts008
title: Ensure certificate pinning is configured
category: transport_security
severity: medium
description: Checks for MCP connections without certificate pinning for critical communication channels. Without pinning,
  any certificate authority can issue a certificate for the server's domain, enabling man-in-the- middle attacks by compromised
  or coerced CAs.
risk_explanation: 'Without certificate pinning, an attacker who compromises any trusted certificate authority (or obtains
  a misissued certificate) can intercept TLS connections to the MCP server. There are hundreds of trusted CAs, and several
  have been compromised historically. Pinning restricts accepted certificates to a known set, mitigating CA compromise.

  '
remediation: '1. Implement certificate pinning for connections to critical MCP servers.

  2. Pin the server''s public key or a trusted intermediate CA certificate.

  3. Use HTTP Public Key Pinning (HPKP) headers or application-level pinning.

  4. Maintain backup pins for key rotation.

  5. Monitor Certificate Transparency logs for unauthorized certificate issuance.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP03:2025
tags:
- transport_security
- certificate_pinning
- ca_compromise
- tls
applicable_transports:
- http
