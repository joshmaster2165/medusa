check_id: ts001
title: Ensure Transport uses encryption
category: transport_security
severity: critical
description: Checks the MCP server for using plain HTTP instead of HTTPS for their transport layer. Unencrypted transport
  exposes all tool calls, responses, and credentials to network-level interception and man-in-the-middle attacks.
risk_explanation: 'Without TLS encryption, any network observer (ISP, shared WiFi, compromised router) can read and modify
  MCP traffic in transit. This includes tool invocations, their parameters, returned data, and authentication tokens.

  '
remediation: '1. Switch all MCP server transport URLs from http:// to https://.

  2. Ensure TLS certificates are valid and up to date.

  3. If the server is in development, use a self-signed certificate or a local CA for testing.'
references:
- https://modelcontextprotocol.io/specification/2025-03-26/basic/transports
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP07:2025
tags:
- transport_security
- tls
- encryption
