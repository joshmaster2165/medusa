check_id: ts018
title: Ensure TLS is configured for Proxy
category: transport_security
severity: high
description: Checks the MCP server for proxy configurations that do not use TLS encryption. Proxies without TLS decrypt and
  re-encrypt traffic, creating a plaintext exposure point. Unencrypted proxy connections expose all traffic to interception
  at the proxy hop.
risk_explanation: 'An unencrypted proxy connection creates a plaintext segment in the communication path where all traffic,
  including authentication tokens and sensitive data, is exposed. Even if the origin and destination use HTTPS, an unencrypted
  proxy hop exposes the decrypted traffic to the proxy operator and any attacker who can intercept the proxy connection.

  '
remediation: '1. Configure TLS encryption for all proxy connections (HTTPS proxy).

  2. Use CONNECT tunnelling for end-to-end encryption through proxies.

  3. Verify proxy certificate authenticity.

  4. Avoid HTTP proxy configurations in production environments.

  5. Implement proxy authentication to prevent unauthorized proxy usage.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP03:2025
tags:
