check_id: sess009
title: Ensure Session Data is not exposed
category: session_management
severity: high
description: Checks the MCP server for implementations that store sensitive data directly in session objects or transmit session
  contents to the client. Session data may include tool invocation history, user credentials, resource URIs, or intermediate
  computation results that should not be exposed to the LLM client or stored in client-accessible session storage.
risk_explanation: 'Exposed session data can reveal sensitive information about MCP tool invocations, user credentials, internal
  resource URIs, and server-side state. Attackers can extract this data to map internal infrastructure, harvest credentials,
  or understand tool behavior for crafting more sophisticated attacks. Client-side session storage is particularly dangerous
  as it persists beyond the session lifetime.

  '
remediation: '1. Store all sensitive session data server-side in a secure session store.

  2. Never include credentials, internal URIs, or sensitive tool outputs in client-visible session data.

  3. Encrypt server-side session storage at rest.

  4. Minimize the data stored in sessions to only what is required for session management.

  5. Implement session data classification and enforce storage policies based on sensitivity.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
