check_id: sess005
title: Ensure Session Invalidation on Logout is configured
category: session_management
severity: info
description: Checks the MCP server for that fail to properly invalidate sessions when a user or LLM client disconnects or
  logs out. Without explicit session invalidation, session tokens remain valid on the server side even after the client believes
  the session has ended, creating a window for session reuse attacks.
risk_explanation: 'If MCP sessions are not invalidated upon logout, an attacker who has captured a session token can continue
  to use it for tool invocations even after the legitimate user has disconnected. This is particularly dangerous in shared
  environments or when session tokens are leaked through logs, as the tokens remain permanently usable.

  '
remediation: '1. Implement server-side session invalidation that destroys all session state upon logout or disconnection.

  2. Remove the session from the server-side session store immediately.

  3. Ensure all associated tokens, including refresh tokens and access tokens tied to the session, are revoked.

  4. Return an error for any subsequent requests using the invalidated session ID.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
