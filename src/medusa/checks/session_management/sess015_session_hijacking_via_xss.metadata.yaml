check_id: sess015
title: Ensure protection against session hijacking via XSS
category: session_management
severity: high
description: Checks the MCP server for configurations where session tokens are accessible to client-side JavaScript, making
  them vulnerable to exfiltration via cross-site scripting (XSS) attacks. If an attacker injects malicious scripts into the
  LLM client interface, they can steal session tokens and hijack the MCP session.
risk_explanation: 'JavaScript-accessible session tokens can be stolen by XSS payloads injected into the LLM client interface
  or tool output rendering. Once stolen, the attacker can use the session token from any location to invoke MCP tools, access
  resources, and impersonate the legitimate user. MCP servers are particularly vulnerable because tool outputs may contain
  attacker-controlled content that is rendered in the client.

  '
remediation: '1. Set the HttpOnly flag on all session cookies to prevent JavaScript access.

  2. Implement Content Security Policy (CSP) headers to mitigate XSS attacks.

  3. Sanitize and escape all tool output before rendering in the client.

  4. Avoid storing session tokens in localStorage or sessionStorage where they are accessible to scripts.

  5. Use subresource integrity (SRI) for loaded scripts.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
