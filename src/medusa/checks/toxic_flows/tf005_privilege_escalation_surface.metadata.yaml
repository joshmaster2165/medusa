check_id: tf005
title: Ensure Server does not expose a Privilege Escalation Surface
category: toxic_flows
severity: high
description: >-
  Checks whether the MCP server exposes a mix of low-risk read-only tools and
  high-risk destructive or privileged tools without role-based access controls.
  This combination creates a privilege escalation surface where an attacker who
  compromises a low-risk tool can escalate to destructive operations.
risk_explanation: >-
  When a server combines read-only tools with destructive or privileged tools
  and the high-risk tools lack role or permission parameters, any compromise of
  the lower-risk surface provides a direct path to the most dangerous operations.
  An attacker who gains access through a benign read tool can immediately invoke
  delete, admin, or system-level tools without additional authorization checks.
  This violates the principle of least privilege and creates an unnecessary blast
  radius.
remediation: >-
  1. Add role or permission parameters to all destructive and privileged tools.
  2. Separate high-risk tools onto a dedicated MCP server with stricter access controls.
  3. Implement authorization checks that verify caller permissions before executing
  destructive operations.
  4. Apply the principle of least privilege by granting only the minimum tool access
  needed for each use case.
  5. Add human-in-the-loop confirmation for all destructive tool invocations.
references:
  - https://owasp.org/www-project-mcp-top-10/
  - https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
owasp_mcp:
  - MCP01:2025
tags:
  - toxic_flow
  - privilege_escalation
  - access_control
  - least_privilege
