check_id: tf002
title: Ensure Server does not expose a Destructive Flow
category: toxic_flows
severity: high
description: Checks whether the MCP server exposes a combination of tools that together enable a destructive flow. A
  destructive flow exists when a server has tools that (1) accept untrusted external input and (2) perform destructive
  operations such as deleting files, dropping databases, or executing shell commands. An attacker can chain these capabilities
  to destroy data or compromise the system through the MCP server.
risk_explanation: 'When a server exposes untrusted input tools alongside destructive operation tools, an attacker can
  inject malicious commands via the input tool and trigger destructive actions. For example, a web scraping tool combined
  with a shell execution tool allows an attacker to embed commands in web content that get executed on the server. This
  is especially dangerous because the LLM may follow instructions from untrusted content without recognizing them as
  malicious.

  '
remediation: '1. Review tool combinations and remove unnecessary destructive tools from servers that also accept untrusted
  input.

  2. Separate input-accepting tools from destructive tools onto different MCP servers.

  3. Implement mandatory user confirmation for all destructive operations.

  4. Add input sanitization to tools that accept external content.

  5. Use allowlists to restrict which operations destructive tools can perform.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
owasp_mcp:
- MCP02:2025
