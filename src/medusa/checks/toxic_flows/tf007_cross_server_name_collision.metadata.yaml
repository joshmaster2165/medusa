check_id: tf007
title: Ensure no tool name collisions across servers
category: toxic_flows
severity: high
description: >-
  Detects when multiple MCP servers expose tools with the same or
  near-identical names.  In multi-server environments the LLM selects
  tools by name; collisions let an attacker-controlled server shadow a
  trusted tool so the LLM invokes the malicious version instead.  This
  check compares tool names across all scanned servers, catching both
  exact matches and normalised near-collisions (camelCase vs snake_case,
  common prefix/suffix differences).
risk_explanation: >-
  When two servers expose a tool named "run_query", the LLM has no reliable
  way to choose the correct one.  An attacker who registers a malicious MCP
  server with the same tool name as a trusted server can intercept tool
  invocations, steal parameters (including credentials and PII), return
  poisoned results, or execute arbitrary code.  Near-collisions such as
  "runQuery" vs "run_query" compound the risk because the LLM treats them
  as equivalent.
remediation: >-
  1. Use globally unique, namespaced tool names that include the server or
  organisation prefix (e.g. "acme_run_query" instead of "run_query").
  2. Configure the MCP client or gateway to reject server registrations
  that introduce tool name collisions with existing servers.
  3. Implement tool routing policies that bind specific tool names to
  specific servers, preventing shadowing.
  4. Audit all registered servers for overlapping tool names before
  deploying to production.
references:
  - https://owasp.org/www-project-mcp-top-10/
  - https://modelcontextprotocol.io/specification/2025-03-26/server/tools
owasp_mcp:
  - MCP06:2025
tags:
  - toxic_flows
  - tool_shadowing
  - name_collision
  - multi_server
