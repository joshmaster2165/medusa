check_id: samp008
title: Ensure protection against Sampling Context manipulation
category: sampling_security
severity: high
description: Checks the MCP server for implementations where sampling requests can manipulate the LLM's context window by
  injecting or modifying the conversation history, system prompts, or tool outputs available during sampling. Context manipulation
  can alter the LLM's understanding of the current task and available information.
risk_explanation: 'Sampling context manipulation allows a malicious MCP server to alter the information the LLM uses to make
  decisions. By injecting false conversation history, fabricated tool outputs, or modified system instructions into the sampling
  context, the attacker can cause the LLM to make decisions based on false premises. This can lead to incorrect tool invocations,
  data corruption, and actions that the user would not have approved if given accurate information.

  '
remediation: '1. Isolate the sampling context from the main conversation context.

  2. Validate all context provided by MCP servers in sampling requests against expected formats and content policies.

  3. Prevent sampling requests from modifying the conversation history or system prompts.

  4. Display the sampling context to the user for verification.

  5. Implement context integrity checks that detect modifications to protected context elements.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://unit42.paloaltonetworks.com/mcp-security-risks-vulnerabilities/
owasp_mcp:
