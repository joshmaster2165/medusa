check_id: samp009
title: Ensure Sampling Response Validation is configured
category: sampling_security
severity: high
description: Checks the MCP server for implementations that process sampling responses from the LLM without validation. Unvalidated
  sampling responses may contain unexpected content, malformed data, or injected instructions that the server processes as
  trusted input, leading to secondary injection attacks or logic errors.
risk_explanation: 'When MCP servers process LLM sampling responses without validation, they are vulnerable to attacks where
  the LLM''s response contains unexpected or malicious content. An attacker who can influence the LLM''s output through prompt
  injection can use sampling responses as a vector for injecting commands into the MCP server''s processing pipeline. This
  creates a bidirectional attack channel where compromised LLM outputs exploit the server.

  '
remediation: '1. Validate all sampling responses before processing them in MCP server logic.

  2. Implement schema validation for expected response formats.

  3. Sanitize response content to remove potential injection payloads.

  4. Apply content type checking and length limits on sampling responses.

  5. Treat all sampling responses as untrusted input regardless of their origin from the LLM client.

  6. Log and alert on malformed or suspicious sampling responses.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://unit42.paloaltonetworks.com/mcp-security-risks-vulnerabilities/
