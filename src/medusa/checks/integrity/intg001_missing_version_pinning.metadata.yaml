check_id: intg001
title: Ensure Version Pinning for Package Manager Commands is configured
category: integrity
severity: medium
description: Checks the MCP server for launched via package managers (npx, uvx) that auto-install packages without pinning
  a specific version. Without a version pin an attacker who publishes a malicious update can have their code executed automatically
  the next time the server starts.
risk_explanation: 'When npx is invoked with the -y/--yes flag and the package name does not include an @version suffix, npm
  will always fetch the latest version from the registry. A supply-chain attacker who compromises the package or publishes
  a typosquat can gain arbitrary code execution on the host. The same risk applies to uvx when no version constraint is provided.

  '
remediation: '1. Always pin package versions explicitly (e.g.

  2. npx @scope/pkg@1.2.3).

  3. Avoid using the -y/--yes flag with npx in production configurations.

  4. For uvx, specify a version constraint in the command arguments.

  5. Consider using a lockfile or hash verification for additional integrity assurance.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://blog.phylum.io/the-dangers-of-npx/
owasp_mcp:
