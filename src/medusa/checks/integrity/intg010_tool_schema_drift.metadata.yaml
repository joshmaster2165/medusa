check_id: intg010
title: Ensure tool schema integrity is maintained
category: integrity
severity: high
description: Checks for changes to MCP tool input schemas that occur without a corresponding version bump. Schema drift can
  indicate tool tampering or uncontrolled changes that break client expectations.
risk_explanation: 'When tool schemas change without a version update, clients that rely on the previous schema may send incorrect
  data or fail to validate tool outputs. Attackers can exploit schema drift to add hidden parameters that exfiltrate data
  or to change tool behavior without triggering version-based security reviews.

  '
remediation: '1. Implement schema versioning that requires a version bump for any change to a tool''s input or output schema.

  2. Use schema comparison in CI to detect drift automatically.

  3. Maintain a schema changelog and require review for all schema modifications.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP04:2025
tags:
- integrity
- schema
- versioning
- drift_detection
