check_id: intg020
title: Inconsistent Tool Naming Convention
category: integrity
severity: info
description: >
  Detects tools within the same server that use inconsistent naming
  conventions (mixing camelCase, snake_case, kebab-case, PascalCase).
  Inconsistency suggests poor governance and increases confusion for
  LLMs and developers.
risk_explanation: >
  Inconsistent naming conventions indicate a lack of development
  standards and governance. Mixed naming styles confuse LLMs during
  tool selection and make it harder for security auditors to identify
  anomalous tools that may have been injected by an attacker. A
  well-governed server uses a single, consistent naming convention
  across all tools.
remediation: >
  Adopt a single naming convention for all tools (snake_case is the
  most common in MCP). Refactor existing tool names to follow the
  chosen convention. Implement automated linting or validation that
  enforces the naming convention during tool registration. Document
  the naming standard in the server's development guidelines.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
owasp_mcp:
  - "MCP01:2025"
tags:
  - integrity
  - naming
  - governance
