check_id: intg011
title: Ensure Reproducible Build is configured
category: integrity
severity: info
description: Checks whether the MCP server can be built reproducibly from source. Without reproducible builds, there is no
  way to verify that the distributed binary matches the published source code.
risk_explanation: 'Without reproducible builds, users must trust that the distributed binary was built from the published
  source code. An attacker who compromises the build system can inject malicious code that does not appear in the source repository.
  Reproducible builds allow independent verification that the binary matches the source.

  '
remediation: '1. Configure the build system to produce reproducible outputs.

  2. Pin all build dependencies and toolchain versions.

  3. Remove sources of non- determinism such as timestamps, random values, and filesystem ordering.

  4. Document the build process and provide instructions for independent verification.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
