check_id: intg013
title: Ensure protection against Typosquatting
category: integrity
severity: high
description: Checks the MCP server for dependencies with names that closely resemble popular packages, indicating potential
  typosquatting. Typosquatting packages contain malicious code disguised as legitimate libraries.
risk_explanation: 'Typosquatting exploits common typing mistakes to trick developers into installing malicious packages. Packages
  with names like "reqeusts" instead of "requests" or "lodsah" instead of "lodash" contain malicious code that executes during
  installation or import. A single misspelled dependency in an MCP server configuration compromises the entire host.

  '
remediation: '1. Verify all dependency names against official package registries before installation.

  2. Use typosquatting detection tools in CI pipelines.

  3. Pin dependencies by exact version and hash.

  4. Review dependency changes carefully in code review, paying special attention to new package additions.'
references:
- https://owasp.org/www-project-mcp-top-10/
