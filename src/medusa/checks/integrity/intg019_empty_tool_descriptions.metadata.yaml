check_id: intg019
title: Ensure Tool Descriptions are populated
category: integrity
severity: low
description: Checks for tools with missing or empty descriptions. LLMs rely heavily on descriptions for tool selection; empty
  descriptions increase the risk of tool misuse and reduce transparency for users and auditors.
risk_explanation: 'LLMs select tools based on their descriptions. A tool without a description may be ignored by the LLM or
  selected incorrectly based solely on its name, leading to unintended tool invocations. Empty descriptions also prevent security
  auditors from understanding what a tool does, making it impossible to assess its risk profile or detect tool poisoning attacks
  that rely on misleading descriptions.

  '
remediation: '1. Provide clear, accurate descriptions for all tools.

  2. Descriptions should explain what the tool does, what inputs it expects, and what side effects it has.

  3. Avoid vague or misleading descriptions.

  4. Implement validation that rejects tool registrations with empty descriptions.

  5. Review descriptions regularly to ensure they accurately reflect current tool behavior.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
tags:
