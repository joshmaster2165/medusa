check_id: mt010
title: Ensure Tenant Configuration Isolation is configured
category: multi_tenant
severity: info
description: Checks the MCP server for where tenant-specific configuration such as security policies, feature flags, access
  controls, and operational parameters is stored in shared configuration without proper isolation. Configuration bleed between
  tenants can alter security posture unexpectedly.
risk_explanation: 'Shared configuration without tenant isolation means that a configuration change for one tenant can inadvertently
  affect other tenants. Security policy changes, feature flag modifications, and access control updates for one tenant may
  be applied to others. An attacker who gains configuration access for one tenant can weaken security settings for all tenants
  on the server.

  '
remediation: '1. Implement tenant-isolated configuration storage with independent configuration contexts per tenant.

  2. Validate that configuration changes are scoped to the requesting tenant.

  3. Use configuration inheritance hierarchies where tenant-specific settings override shared defaults without affecting other
  tenants.

  4. Audit all configuration changes with tenant context for traceability.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP09:2025
tags:
- multi_tenant
- isolation
- data_protection
