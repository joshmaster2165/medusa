check_id: mt002
title: Ensure Resource Cross-Tenant Access is not shared
category: multi_tenant
severity: info
description: Checks the MCP server for resources that are accessible across tenant boundaries without proper access control.
  Shared resources such as files, database connections, caches, and temporary storage that lack tenant-scoped access controls
  enable cross-tenant data access.
risk_explanation: 'Shared resources without tenant scoping create direct data leakage paths between tenants. A tenant can
  read files created by another tenant, access cached data from other tenant sessions, query database records belonging to
  other tenants, or read temporary files from other tenant operations. This violates data confidentiality and may breach regulatory
  requirements.

  '
remediation: '1. Scope all server resources to the requesting tenant using tenant- specific prefixes, namespaces, or separate
  storage.

  2. Implement tenant validation on all resource access operations.

  3. Use separate database schemas, file directories, or cache namespaces per tenant.

  4. Audit all shared resources to ensure tenant isolation is enforced at the storage level, not just the application level.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP09:2025
tags:
- multi_tenant
- isolation
- data_protection
