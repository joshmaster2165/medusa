check_id: mt003
title: Ensure Tenant Data is not leaked
category: multi_tenant
severity: info
description: Checks the MCP server for responses, error messages, logs, or metadata that leak data belonging to one tenant
  to another tenant. Data leakage can occur through shared error handlers, common log streams, cached responses, or improperly
  scoped query results.
risk_explanation: 'Tenant data leakage exposes confidential business information, personal data, and security credentials
  to unauthorized tenants. Even small leaks such as tenant names in error messages or record counts in metadata can reveal
  business intelligence to competitors. Systematic leakage through query result contamination or cache poisoning can expose
  entire datasets across tenant boundaries.

  '
remediation: '1. Audit all server output paths for potential cross-tenant data leakage.

  2. Implement tenant-scoped logging that prevents log data from one tenant being visible to another.

  3. Use separate response serialization contexts per tenant.

  4. Clear all shared state between tenant request processing.

  5. Implement automated testing that verifies tenant data isolation across all server operations.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP09:2025
tags:
- multi_tenant
