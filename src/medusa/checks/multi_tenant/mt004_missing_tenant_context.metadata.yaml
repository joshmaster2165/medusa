check_id: mt004
title: Ensure Tenant Context Validation is configured
category: multi_tenant
severity: info
description: Checks the MCP server for requests that are processed without validating the tenant context, or where the tenant
  identifier is derived from client- supplied data without verification. Missing tenant context validation allows clients
  to operate outside their authorized tenant scope.
risk_explanation: 'Without tenant context validation, a client can forge or manipulate its tenant identifier to access another
  tenant context. If the tenant ID is taken from a request header or parameter without cryptographic verification, any client
  can impersonate any tenant by simply changing the value. This enables complete bypass of all tenant-based access controls.

  '
remediation: '1. Derive the tenant context from authenticated session state rather than client-supplied parameters.

  2. Validate tenant context cryptographically using signed tokens or verified session data.

  3. Reject requests that lack valid tenant context.

  4. Implement tenant context as an immutable property of the authenticated session that cannot be modified by the client
  after authentication.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP09:2025
tags:
- multi_tenant
- isolation
- data_protection
