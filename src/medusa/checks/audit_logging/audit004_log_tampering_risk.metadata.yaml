check_id: audit004
title: Ensure protection against Log Tampering
category: audit_logging
severity: info
description: Checks the MCP server for log storage configurations where logs are stored in writable locations without integrity
  protections. Attackers who compromise the server can modify or delete logs to cover their tracks.
risk_explanation: 'If logs are stored in locations writable by the MCP server process, an attacker who compromises the server
  can delete or modify log entries to erase evidence of their activities. This defeats the purpose of audit logging and allows
  attackers to operate undetected for extended periods.

  '
remediation: '1. Ship logs to a write-only remote destination that the MCP server cannot modify or delete.

  2. Use append-only log storage with cryptographic chaining to detect tampering.

  3. Implement log integrity verification using hash chains or digital signatures.

  4. Separate log storage permissions from the server''s runtime permissions.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP08:2025
tags:
