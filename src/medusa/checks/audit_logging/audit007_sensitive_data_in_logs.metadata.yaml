check_id: audit007
title: Ensure sensitive data is not present in logs
category: audit_logging
severity: high
description: Checks the MCP server for logging configurations or patterns that write sensitive data such as PII, credentials,
  or API keys to log files. Sensitive data in logs creates secondary exposure vectors.
risk_explanation: 'Log files are frequently stored with less restrictive access controls than primary data stores and are
  often aggregated in third-party logging platforms. Credentials in logs can be used for lateral movement, PII in logs violates
  privacy regulations, and API keys in logs can be exploited for unauthorized access to external services.

  '
remediation: '1. Implement log scrubbing that automatically detects and redacts sensitive data patterns (API keys, passwords,
  SSNs, credit card numbers) before writing to logs.

  2. Use structured logging with explicit field allow-lists.

  3. Configure log frameworks to mask sensitive parameter values.

  4. Regularly audit log output for sensitive data leakage.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
