check_id: audit001
title: Ensure Logging Configuration is configured
category: audit_logging
severity: info
description: Checks whether the MCP server's configuration or environment variables include any logging or observability settings.
  Servers without logging configuration cannot produce audit trails for security investigations.
risk_explanation: 'Without logging, malicious tool invocations, data exfiltration attempts, and prompt injection attacks leave
  no trace. Incident response teams cannot reconstruct attack timelines or determine the scope of a breach.

  '
remediation: '1. Configure structured logging for the MCP server.

  2. Set a LOG_LEVEL environment variable and ensure logs are shipped to a centralised logging platform.

  3. Consider integrating OpenTelemetry or a similar observability framework.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP08:2025
