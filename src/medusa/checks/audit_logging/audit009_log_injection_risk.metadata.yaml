check_id: audit009
title: Ensure protection against Log Injection
category: audit_logging
severity: high
description: Checks the MCP server for logging patterns that write user-supplied input to log files without sanitization.
  Unsanitized log entries enable log injection attacks that corrupt log integrity.
risk_explanation: 'Log injection allows attackers to forge log entries by embedding newlines, control characters, or structured
  log syntax in user input. Forged log entries can hide malicious activity, create false audit trails, and exploit log processing
  systems that parse log content as commands or queries (e.g. SIEM injection, log4shell-style attacks).

  '
remediation: '1. Sanitize all user input before writing to logs.

  2. Escape or strip newline characters, control characters, and structured log delimiters.

  3. Use structured logging formats (JSON) that properly encode user input as string values.

  4. Validate that log entries conform to the expected format before ingestion into log processing systems.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
