check_id: audit011
title: Ensure Server advertises the MCP Logging Capability
category: audit_logging
severity: medium
description: >-
  Checks whether the MCP server advertises the logging capability in its
  initialization response. Without the logging capability, the server has no
  standardized mechanism for emitting audit events, making incident detection
  and forensic analysis impossible.
risk_explanation: >-
  The MCP logging capability provides a standardized interface for servers to
  emit structured log events to clients. When a server does not advertise this
  capability, there is no audit trail for tool invocations, resource accesses,
  or security events. This makes it impossible to detect ongoing attacks,
  investigate security incidents, or demonstrate compliance with audit
  requirements. Attackers benefit from the absence of logging because their
  activities leave no trace in the MCP protocol layer.
remediation: >-
  1. Enable the logging capability in the server's MCP initialization response.
  2. Emit structured log events for all tool invocations and resource accesses.
  3. Include severity levels, timestamps, and context in log messages.
  4. Forward MCP log events to a centralized SIEM or log aggregation system.
  5. Implement log retention policies aligned with compliance requirements.
references:
  - https://owasp.org/www-project-mcp-top-10/
  - https://modelcontextprotocol.io/specification/2025-03-26/server/utilities/logging
owasp_mcp:
  - MCP10:2025
tags:
  - audit_logging
  - logging_capability
  - incident_detection
  - compliance
