check_id: priv026
title: Detect admin tools without authorization parameters
category: privilege_scope
severity: high
description: >-
  Detects tools matching admin operation patterns such as create_user,
  modify_role, grant_permission, and deploy that lack authorization parameters
  like role, permission, scope, or token. Admin tools without any authorization
  parameters represent a privilege escalation risk.
risk_explanation: >-
  Admin tools that lack authorization parameters allow any caller to perform
  privileged operations without proving they have the required permissions.
  When an LLM invokes such tools, there is no schema-level mechanism to
  enforce access control, enabling unauthorized privilege escalation through
  tool invocation.
remediation: >-
  1. Add role, permission, or scope parameters to all admin-level tools.
  2. Implement server-side authorization checks that validate caller permissions.
  3. Use tool annotations to mark admin tools and require elevated approval workflows.
  4. Default admin tool parameters to least-privilege values.
references:
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP01:2025
tags:
  - admin_tools
  - authorization
  - privilege_escalation
  - structural_analysis
