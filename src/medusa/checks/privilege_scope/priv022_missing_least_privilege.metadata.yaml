check_id: priv022
title: Ensure Least Privilege is configured
category: privilege_scope
severity: info
description: Checks the MCP server for requesting more permissions than their tools require. Servers that request broad filesystem,
  network, or system access when their tools only need narrow capabilities violate the principle of least privilege.
risk_explanation: 'Over-privileged servers amplify the impact of any vulnerability. A tool that only needs to read a single
  configuration file but has full filesystem access allows exploitation to read any file on the system. Excess permissions
  are dormant attack surface that becomes exploitable through any vulnerability in the server''s tools.

  '
remediation: '1. Audit all server permissions against actual tool requirements.

  2. Remove permissions that are not actively used by any tool.

  3. Implement capability-based security where each tool declares its required permissions.

  4. Use the MCP tool annotations to document required capabilities and validate them against actual server permissions.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP07:2025
tags:
