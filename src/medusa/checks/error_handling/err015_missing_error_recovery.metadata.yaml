check_id: err015
title: Ensure Error Recovery is configured
category: error_handling
severity: info
description: Checks the MCP server for implementations that lack automatic error recovery mechanisms such as retry logic,
  connection re-establishment, or state rollback after transient failures. Missing recovery causes persistent failures from
  temporary issues.
risk_explanation: 'Without automatic error recovery, transient failures such as network timeouts, temporary resource unavailability,
  or brief service interruptions cause permanent tool failures until manual intervention. Attackers can exploit this by causing
  brief disruptions that permanently degrade server functionality. State inconsistencies from unrecovered errors may also
  create security vulnerabilities.

  '
remediation: '1. Implement retry logic with exponential backoff for transient failures in tool operations.

  2. Add connection pool recovery for database and network connections.

  3. Implement transaction rollback on failure to maintain state consistency.

  4. Use health checks to detect and recover from degraded states automatically.'
references:
- https://owasp.org/www-project-mcp-top-10/
