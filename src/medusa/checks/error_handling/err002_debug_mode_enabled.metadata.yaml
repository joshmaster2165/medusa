check_id: err002
title: Ensure Debug Mode is disabled in production
category: error_handling
severity: high
description: Checks the MCP server for running with debug or development mode flags enabled in production environments. Debug
  mode typically disables security controls, enables verbose logging, exposes diagnostic endpoints, and may auto-reload code
  on changes.
risk_explanation: 'Debug mode often disables authentication, enables detailed error pages with interactive debuggers, exposes
  environment variables, and provides code execution capabilities through debug consoles. An attacker who discovers a debug-mode
  server can achieve full remote code execution or extract secrets with minimal effort.

  '
remediation: '1. Ensure all MCP servers are deployed with debug and development mode flags explicitly set to false or removed
  entirely.

  2. Use environment variable checks to enforce production mode.

  3. Implement CI/CD checks that fail deployments containing debug configuration flags.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
