check_id: err010
title: Ensure Graceful Degradation is configured
category: error_handling
severity: info
description: Checks the MCP server for that fail completely when dependent services become unavailable rather than degrading
  gracefully. Missing degradation strategies mean a single service failure can cascade into total MCP server unavailability.
risk_explanation: 'Without graceful degradation, an attacker can take down the entire MCP server by disrupting a single dependency.
  Cascading failures amplify denial-of-service attacks and may leave the system in an inconsistent state. Tools that depend
  on failed services may return corrupted or partial data without indicating the failure.

  '
remediation: '1. Implement circuit breaker patterns for all external service calls.

  2. Design tools to operate in degraded mode when dependencies are unavailable, returning partial results with clear status
  indicators.

  3. Use timeouts and fallback responses for non-critical dependencies.

  4. Monitor dependency health and alert on degraded operation.'
references:
- https://owasp.org/www-project-mcp-top-10/
