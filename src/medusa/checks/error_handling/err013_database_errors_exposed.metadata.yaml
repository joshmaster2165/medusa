check_id: err013
title: Ensure Database Errors is not exposed
category: error_handling
severity: high
description: Checks the MCP server for error responses that include raw database error messages, SQL statements, connection
  strings, or database engine error codes. These details reveal database type, schema structure, and query logic to potential
  attackers.
risk_explanation: 'Raw database errors can reveal table names, column names, SQL query structure, database engine version,
  and connection details. This information directly enables SQL injection attacks by showing attackers the exact query context.
  Connection strings may contain credentials. Database version information identifies known CVEs.

  '
remediation: '1. Catch all database exceptions at the data access layer and translate them into generic application-level
  errors.

  2. Never expose raw SQL errors, connection strings, or database engine details to MCP clients.

  3. Log database errors server-side with full context for debugging.

  4. Use parameterized queries to prevent SQL injection.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP08:2025
tags:
