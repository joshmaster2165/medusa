check_id: dp021
title: Ensure Camera/Microphone access is controlled
category: data_protection
severity: critical
description: Checks for MCP tools with audio or video capture capabilities. Camera and microphone access enables surveillance
  of the user's physical environment.
risk_explanation: 'Camera and microphone access enables real-time surveillance of the user''s physical environment. A malicious
  MCP tool can record conversations, capture video of the user and their surroundings, and observe private activities. This
  represents one of the most severe privacy violations possible.

  '
remediation: '1. Block all MCP tools that request camera or microphone access unless explicitly required and user-approved.

  2. Implement hardware-level indicators (e.g.

  3. LED lights) that activate during capture.

  4. Require per-session consent and provide immediate revocation capabilities.

  5. Log all audio/video capture events.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
- data_protection
- camera
- microphone
- surveillance
- critical_risk
