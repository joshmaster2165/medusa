check_id: dp033
title: Ensure no single Tool can both read and exfiltrate data
category: data_protection
severity: critical
description: Detects tools that combine data-source parameters (file, path, query, content) with data-sink parameters (url, webhook,
  endpoint, email) in the same input schema. A single tool with both capabilities enables data exfiltration in one invocation without
  needing to chain multiple tools, as described in the Data Exfiltration Covert Channels TTP.
risk_explanation: 'When a single tool accepts both a data source and an outbound destination, an attacker or compromised LLM can read
  sensitive data and send it to an external endpoint in one step. This bypasses multi-tool chain detection and makes exfiltration
  harder to detect through tool call monitoring.

  '
remediation: '1. Separate data-reading and data-sending capabilities into distinct tools with independent access controls.

  2. If a tool must accept both source and destination parameters, restrict the destination to a pre-approved allowlist.

  3. Implement output filtering that prevents sensitive data from being included in outbound requests.

  4. Add mandatory human approval for tool calls that combine read and send operations.'
references:
- https://modelcontextprotocol-security.io/ttps/data-exfiltration/data-exfiltration/
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
