check_id: dp015
title: Ensure protection against Clipboard Data Exposure
category: data_protection
severity: medium
description: Checks for MCP tools with capabilities to read or write clipboard contents without explicit user awareness. Clipboard
  access can expose passwords, sensitive text, and copied credentials to the MCP server.
risk_explanation: 'The clipboard frequently contains sensitive data such as passwords, API keys, personal messages, and financial
  information that users copy during normal workflows. An MCP tool that silently reads clipboard contents can exfiltrate this
  data without the user''s knowledge, creating a covert data theft channel.

  '
remediation: '1. Require explicit user confirmation before any clipboard access.

  2. Display clear notifications when clipboard data is read or written.

  3. Implement clipboard access as a gated permission that must be explicitly granted by the user.

  4. Log all clipboard access events for audit purposes.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
- data_protection
