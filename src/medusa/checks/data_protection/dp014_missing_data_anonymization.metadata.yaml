check_id: dp014
title: Ensure Data Anonymization is configured
category: data_protection
severity: medium
description: Checks the MCP server for that handle sensitive datasets without applying anonymization or pseudonymization techniques.
  Raw sensitive data flowing through the MCP pipeline increases exposure risk.
risk_explanation: 'Without anonymization, sensitive data retains its full identifying power throughout the processing pipeline.
  If any component in the chain is compromised, the attacker gains access to fully identifiable data. Anonymization reduces
  the value of stolen data and limits the scope of privacy breaches.

  '
remediation: '1. Apply anonymization or pseudonymization to sensitive datasets before processing.

  2. Use techniques such as k-anonymity, differential privacy, or data masking.

  3. Ensure anonymization is applied as early as possible in the data pipeline and that re-identification is not feasible
  from the anonymised output.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
