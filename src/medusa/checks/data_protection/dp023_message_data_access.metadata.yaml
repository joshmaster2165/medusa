check_id: dp023
title: Ensure Message/Chat Data access is controlled
category: data_protection
severity: high
description: Checks for MCP tools that access messaging history, chat logs, email content, or other communication data. Message
  data contains private conversations and potentially sensitive information.
risk_explanation: 'Messaging and chat data contains private conversations, shared files, business discussions, and personal
  communications. Access to this data exposes confidential information, trade secrets, personal relationships, and sensitive
  topics that users reasonably expect to remain private.

  '
remediation: '1. Require explicit user consent before accessing any messaging data.

  2. Implement conversation-level access controls rather than blanket access to all messages.

  3. Apply time-bounded access windows and log all message data access events.

  4. Never cache or persist accessed message content beyond the immediate processing need.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
