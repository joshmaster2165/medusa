check_id: dp009
title: Ensure Encryption at Rest is configured
category: data_protection
severity: info
description: Checks the MCP server for configurations where stored data, caches, or persistent state lack encryption at rest.
  Unencrypted data on disk is vulnerable to theft if the host is compromised.
risk_explanation: 'Data stored without encryption at rest can be read by anyone with filesystem access. If the MCP server
  host is compromised, an attacker gains immediate access to all stored data including credentials, PII, and business-critical
  information without needing to break any cryptographic protections.

  '
remediation: '1. Enable encryption at rest for all persistent storage used by the MCP server.

  2. Use platform-provided encryption (e.g.

  3. LUKS, FileVault, AWS EBS encryption) or application-level encryption with properly managed keys.

  4. Ensure encryption keys are stored separately from the encrypted data.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
- data_protection
- encryption
- storage
- cryptography
applicable_transports:
- http
