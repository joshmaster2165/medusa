check_id: dp019
title: Ensure Contact Data access is controlled
category: data_protection
severity: high
description: Checks for MCP tools that access contacts, address books, or contact databases. Contact data contains PII of
  third parties who have not consented to data processing.
risk_explanation: 'Contact data includes names, phone numbers, email addresses, and physical addresses of the user''s contacts.
  Accessing this data exposes the PII of third parties who have not consented to data processing, creating GDPR violations
  and enabling social engineering attacks against the user''s contacts.

  '
remediation: '1. Require explicit user consent before accessing contact data.

  2. Implement granular access controls that allow users to share specific contacts rather than the entire address book.

  3. Apply data minimization by only accessing the specific contact fields needed for the tool''s function.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
- data_protection
- contacts
- pii
- third_party_data
