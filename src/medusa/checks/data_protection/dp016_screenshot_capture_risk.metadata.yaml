check_id: dp016
title: Ensure protection against Screenshot Capture
category: data_protection
severity: high
description: Checks for MCP tools with capabilities to capture screen content. Screenshot capture can expose any visible information
  including private messages, banking details, medical records, and authentication tokens.
risk_explanation: 'Screen capture provides access to all visible information on the user''s display, regardless of the application
  or context. A malicious MCP tool with screenshot capabilities can capture sensitive information from any application, including
  banking portals, medical systems, private messages, and authentication screens.

  '
remediation: '1. Restrict screenshot capabilities to explicitly approved use cases.

  2. Require user confirmation before each capture.

  3. Implement capture region limiting so that only the relevant application window is captured.

  4. Apply automatic redaction of detected sensitive content in captured images.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
- data_protection
- screenshot
- privacy
- screen_capture
