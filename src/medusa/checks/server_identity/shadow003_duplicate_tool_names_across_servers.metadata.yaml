check_id: shadow003
title: Ensure Tool Names Across Servers is unique
category: server_identity
severity: critical
description: Checks for multiple MCP servers in the same client configuration that expose tools with identical names. Duplicate
  tool names create ambiguity about which server handles a given tool invocation.
risk_explanation: 'When multiple servers expose identically-named tools, the LLM or client may route invocations to the wrong
  server. A malicious server can register tools with the same names as a legitimate server to intercept tool calls, capture
  sensitive parameters, and return manipulated results. This is a direct tool shadowing attack that exploits name collisions.

  '
remediation: '1. Enforce unique tool names across all MCP servers in a client configuration.

  2. Use namespaced tool names that include the server identity (e.g.

  3. "acme-billing.create-invoice" instead of "create- invoice").

  4. Implement client-side validation that rejects duplicate tool names at configuration time.

  5. Alert users when tool name collisions are detected.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP06:2025
tags:
- server_identity
- tool_shadowing
- name_collision
