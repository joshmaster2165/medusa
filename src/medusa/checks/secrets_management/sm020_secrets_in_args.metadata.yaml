check_id: sm020
title: Secrets in Command-Line Arguments
category: secrets_management
severity: high
description: >
  Detects potential secrets passed via command-line arguments to the
  MCP server process. Checks for high-entropy strings, credential
  flags (--password=, --token=), and known secret prefix patterns
  (sk-, AKIA, ghp_, etc.) in the server's argument list.
risk_explanation: >
  Command-line arguments are visible to any user on the system via
  process listing tools (ps, /proc). They are also recorded in shell
  history files, system audit logs, and container orchestration logs.
  Passing secrets as command-line arguments exposes them to local
  privilege escalation attacks, log harvesting, and accidental
  disclosure through debugging output. This is especially critical
  for MCP servers running as stdio subprocesses.
remediation: >
  Pass secrets via environment variables instead of command-line
  arguments. Better yet, use a dedicated secret management system
  (e.g., HashiCorp Vault, AWS Secrets Manager) and have the server
  fetch secrets at runtime. If command-line configuration is required,
  use a configuration file with restricted permissions and pass the
  file path as the argument instead of the secret value itself.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/tools"
owasp_mcp:
  - "MCP05:2025"
tags:
  - secrets_management
  - command_line
  - process_security
