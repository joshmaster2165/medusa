check_id: sm001
title: Ensure Secrets are not stored in plaintext in Configuration
category: secrets_management
severity: critical
description: Checks the MCP server for configuration files that contain secrets such as API keys, database passwords, encryption
  keys, and OAuth tokens stored in plaintext without encryption. Plaintext secrets in configuration files are the most common
  credential exposure vector.
risk_explanation: 'Plaintext secrets in configuration files are exposed to anyone with read access to the file system, including
  other processes on the same host, backup systems, configuration management tools, and log aggregators that capture configuration
  data. A single file read vulnerability or misconfigured file permissions exposes all secrets in the configuration, often
  granting access to databases, external APIs, and other critical services.

  '
remediation: '1. Move all secrets out of configuration files and into a dedicated secrets management service such as HashiCorp
  Vault, AWS Secrets Manager, or Azure Key Vault.

  2. Use encrypted configuration values with runtime decryption as an intermediate step.

  3. Implement configuration scanning in CI/CD pipelines that blocks deployments containing plaintext secrets.

  4. Rotate any secrets that were previously stored in plaintext.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
