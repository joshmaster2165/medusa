check_id: sm002
title: Ensure Secret Rotation is configured
category: secrets_management
severity: info
description: Checks the MCP server for that use long-lived secrets without a rotation policy or mechanism. Secrets that are
  never rotated remain valid indefinitely, extending the window of opportunity for compromised credentials to be exploited.
risk_explanation: 'Without secret rotation, a compromised credential remains valid until manually revoked, which may never
  happen if the compromise goes undetected. Long-lived secrets accumulate exposure through backup systems, log files, memory
  dumps, and personnel changes. The longer a secret exists, the more opportunities arise for it to be exposed through any
  of these channels.

  '
remediation: '1. Implement automated secret rotation with configurable rotation periods based on secret sensitivity.

  2. Use short-lived tokens and certificates that expire automatically.

  3. Set up rotation schedules that align with compliance requirements.

  4. Implement zero-downtime rotation that supports overlapping validity periods during transitions.

  5. Monitor for secrets that exceed their rotation deadline.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
