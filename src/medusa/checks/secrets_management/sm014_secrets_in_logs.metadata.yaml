check_id: sm014
title: Ensure secrets are not present in Log Output
category: secrets_management
severity: high
description: Checks the MCP server for that include secrets in log output, whether in application logs, access logs, error
  logs, or debug logs. Logged secrets are exposed to anyone with log access and persist in log storage systems indefinitely.
risk_explanation: 'Secrets in logs are exposed to log aggregation systems, SIEM platforms, monitoring dashboards, and anyone
  with log file access. Logs are often retained for extended periods and stored with less security than credential stores.
  Log data may be shipped to third- party services, shared during debugging, or included in support requests. A secret logged
  once persists across all log backups and replicas.

  '
remediation: '1. Implement log sanitization that detects and masks secrets before they are written to log output.

  2. Use structured logging with explicit field marking for sensitive values.

  3. Never log authentication tokens, API keys, passwords, or encryption keys.

  4. Audit existing logs for secret exposure and purge any discovered instances.

  5. Implement automated log scanning for secret patterns.'
references:
- https://owasp.org/www-project-mcp-top-10/
