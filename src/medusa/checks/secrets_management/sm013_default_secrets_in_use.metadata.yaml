check_id: sm013
title: Ensure Secrets in Use does not use defaults
category: secrets_management
severity: critical
description: Checks the MCP server for that are using default secrets, example tokens, or placeholder credentials that were
  included in documentation, sample configurations, or initial setup scripts. Default secrets are publicly known and provide
  trivial unauthorized access.
risk_explanation: 'Default secrets are documented in installation guides, source code repositories, and tutorial materials
  that are publicly accessible. Automated scanning tools continuously probe for servers using known default credentials. An
  MCP server using default secrets can be compromised within seconds of being exposed to the internet, as no vulnerability
  discovery is required. This is one of the most common and easily prevented causes of server compromise.

  '
remediation: '1. Replace all default secrets during initial server setup before accepting any client connections.

  2. Implement first-run checks that detect default secrets and refuse to start.

  3. Generate unique random secrets during installation.

  4. Scan running deployments for known default values.

  5. Remove example credentials from documentation and replace them with generation instructions.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
