check_id: sm019
title: Weak Default Password Patterns
category: secrets_management
severity: high
description: >
  Detects tool parameter defaults that match common weak passwords
  such as 'password', 'admin', 'changeme', or 'P@ssw0rd'. Only
  checks parameters whose names suggest they hold password or
  credential values (e.g., names containing 'password', 'secret',
  'credential', 'auth').
risk_explanation: >
  Weak default passwords in tool parameters create an easy entry point
  for attackers. If a tool ships with a default password that matches
  common weak passwords, users who do not change the default are
  immediately vulnerable. Attackers routinely scan for default
  credentials, and common passwords like 'admin123' or 'changeme'
  appear in every credential stuffing wordlist. This enables
  unauthorized access to protected functionality.
remediation: >
  Remove all default password values from tool parameter schemas.
  Require users to explicitly provide strong passwords at runtime.
  If default values are needed for development, use clearly marked
  placeholders and enforce password strength requirements in the
  tool implementation. Implement password complexity validation that
  rejects known weak passwords.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/tools"
owasp_mcp:
  - "MCP05:2025"
tags:
  - secrets_management
  - weak_passwords
  - default_credentials
