check_id: sm017
title: Secrets in Tool Descriptions
category: secrets_management
severity: critical
description: >
  Detects API keys, tokens, and secrets accidentally exposed in tool
  description text. Tool descriptions are visible to all MCP clients
  and LLM agents, making them a high-risk location for credential
  leakage. Scans for known secret prefixes (e.g., sk-, AKIA, ghp_)
  and credential assignment patterns (e.g., password=, token=).
risk_explanation: >
  Tool descriptions are transmitted to every connecting client during
  tool discovery and are often included in LLM context windows. If a
  developer accidentally pastes an API key or token into a description
  string, it becomes visible to all users and may be logged, cached,
  or sent to third-party LLM providers. This can lead to unauthorized
  access to external services, financial charges on compromised API
  accounts, and lateral movement within infrastructure.
remediation: >
  Remove all secrets, API keys, tokens, and credentials from tool
  description text. Use placeholder values in documentation examples
  (e.g., 'sk-YOUR_KEY_HERE'). Implement pre-deployment scanning to
  catch secrets before they reach production. Rotate any credentials
  that have been exposed in tool descriptions immediately.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/tools"
owasp_mcp:
  - "MCP05:2025"
tags:
  - secrets_management
  - credential_leakage
  - tool_description
