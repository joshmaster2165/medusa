check_id: sm012
title: Ensure Secret Revocation is configured
category: secrets_management
severity: info
description: Verifies that the MCP server has the ability to immediately revoke secrets when they are compromised. Without
  revocation capability, compromised secrets remain valid until they expire naturally, which may be never for long-lived credentials.
risk_explanation: 'When a secret compromise is detected, the ability to immediately revoke the secret is critical to limiting
  damage. Without revocation, the compromised secret continues to grant access while the incident is being investigated and
  resolved. For secrets without expiration, the compromised credential may be used indefinitely. Each minute of continued
  validity after detection extends the window for data exfiltration and lateral movement.

  '
remediation: '1. Implement immediate secret revocation for all credential types.

  2. Maintain a revocation list that is checked on every authentication attempt.

  3. Use short-lived tokens that require frequent renewal, limiting the impact window of compromise.

  4. Integrate revocation with incident response workflows for automated response.

  5. Test revocation procedures regularly to ensure they work under pressure.'
references:
- https://owasp.org/www-project-mcp-top-10/
