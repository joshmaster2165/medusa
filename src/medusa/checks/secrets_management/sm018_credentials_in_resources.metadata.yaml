check_id: sm018
title: Ensure Credentials are not exposed in Resource Descriptions
category: secrets_management
severity: critical
description: Checks for API keys, tokens, and secrets exposed in MCP resource descriptions and URIs. Also checks for credentials
  embedded in URL authority sections (e.g., ://user:password@host). Resource metadata is visible to all connecting clients
  and may be logged or cached.
risk_explanation: 'Resource descriptions and URIs are shared with every MCP client during resource discovery. Credentials
  embedded in these fields are effectively broadcast to all consumers. URL-embedded credentials (://user:pass@host) are particularly
  dangerous because they may be logged by proxies, web servers, and monitoring systems in plaintext. Compromised credentials
  enable unauthorized access to databases, APIs, and internal services.

  '
remediation: '1. Remove all secrets, credentials, and tokens from resource descriptions and URIs.

  2. Use environment variables or secret managers for database connection strings.

  3. Replace URL-embedded credentials with token-based authentication or connection pooling.

  4. Rotate any credentials that have been exposed immediately.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://modelcontextprotocol.io/specification/2025-03-26/server/tools
owasp_mcp:
- MCP05:2025
tags:
