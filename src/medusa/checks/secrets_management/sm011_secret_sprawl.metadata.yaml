check_id: sm011
title: Ensure secret sprawl is controlled
category: secrets_management
severity: medium
description: Checks the MCP server for deployments where the same secret is duplicated across multiple locations such as configuration
  files, environment variables, scripts, and documentation. Secret sprawl makes it impossible to effectively rotate or revoke
  secrets because copies persist in unknown locations.
risk_explanation: 'Secret sprawl means that rotating or revoking a secret does not actually remove all copies. Duplicated
  secrets in backup files, deployment scripts, documentation, and multiple configuration locations persist long after the
  primary copy is rotated. Each copy is an additional exposure point that can be independently discovered and exploited. The
  organization loses track of where secrets exist, making comprehensive rotation impossible.

  '
remediation: '1. Centralize all secrets in a single secrets management service with references from consuming systems rather
  than copies.

  2. Implement secret scanning across the entire codebase, configuration, and documentation to identify all copies.

  3. Eliminate duplicate copies by replacing them with references to the central store.

  4. Monitor for new secret copies being created outside the central store.'
references:
- https://owasp.org/www-project-mcp-top-10/
