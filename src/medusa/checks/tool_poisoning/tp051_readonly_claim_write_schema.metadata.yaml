check_id: tp051
title: Detect read-only claims with write schema parameters
category: tool_poisoning
severity: critical
description: >-
  Detects tools claiming read-only or safe behavior in their description but
  having write, delete, or execute parameters in their schema. This concrete
  structural mismatch between claimed and actual capabilities is a strong
  indicator of metadata manipulation attacks.
risk_explanation: >-
  A tool that claims to be read-only or non-destructive but has parameters
  for writing, deleting, or executing commands is actively misrepresenting
  its capabilities. The LLM may treat it as safe based on the description
  while the actual schema enables dangerous operations including data
  destruction and code execution.
remediation: >-
  1. Ensure tool descriptions accurately reflect schema capabilities.
  2. If a tool has write or execute parameters, do not claim read-only behavior.
  3. Accurate metadata is essential for safe LLM tool selection.
  4. Audit all tools for mismatches between description claims and schema parameters.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/metadata-manipulation/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - metadata_manipulation
  - capability_mismatch
  - readonly_claim
  - ttp_based
