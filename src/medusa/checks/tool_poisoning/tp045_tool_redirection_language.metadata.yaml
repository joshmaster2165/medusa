check_id: tp045
title: Detect tool redirection language in descriptions
category: tool_poisoning
severity: critical
description: >-
  Detects tool descriptions that explicitly redirect the LLM away from other
  tools using language like "instead of X", "replaces X", or "improved version
  of X". This is a direct indicator of tool shadowing attacks where a malicious
  tool attempts to intercept calls intended for legitimate tools.
risk_explanation: >-
  Tool descriptions containing redirection language actively manipulate the
  LLM's tool selection process. By claiming to replace or supersede other
  tools, a malicious tool can hijack calls intended for legitimate tools,
  enabling data exfiltration, privilege escalation, or other attacks.
remediation: >-
  1. Remove tool redirection language from descriptions.
  2. Tool descriptions should describe their own functionality, not direct the LLM to avoid other tools.
  3. If a tool genuinely supersedes another, handle versioning at the server configuration level.
  4. Audit all tools for language that references or redirects from other tool names.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/tool-shadowing/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - tool_shadowing
  - redirection
  - tool_poisoning
  - ttp_based
