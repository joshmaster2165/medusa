check_id: tp035
title: Ensure Tool Descriptions do not contain encoding bypass obfuscation
category: tool_poisoning
severity: high
description: Detects obfuscated content in tool or parameter descriptions using Unicode escapes, hex escapes, HTML entities, or URL
  encoding. These encoding techniques can hide malicious instructions from text-based security filters while remaining interpretable
  by language models, as described in the Tool Poisoning Encoding/Obfuscation TTP.
risk_explanation: 'Encoded content in tool descriptions can bypass keyword-based security filters. For example, a Unicode-escaped
  string like \\u0065\\u0078\\u0066\\u0069\\u006c (exfil) evades text matching but may be decoded by the LLM. HTML entities and
  URL encoding serve the same purpose. This technique is commonly combined with other attacks to evade detection.

  '
remediation: '1. Normalize and decode all tool descriptions before security analysis and before passing to the LLM.

  2. Reject descriptions containing Unicode escape sequences, hex escapes, or HTML entities not required for display.

  3. Implement multi-layer content inspection that checks both raw and decoded forms of descriptions.

  4. Strip or flag any encoded content that decodes to known attack patterns.'
references:
- https://modelcontextprotocol-security.io/ttps/tool-poisoning/tool-poisoning/
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
