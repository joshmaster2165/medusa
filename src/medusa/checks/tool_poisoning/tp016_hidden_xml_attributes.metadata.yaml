check_id: tp016
title: Ensure Descriptions do not contain hidden XML Attributes
category: tool_poisoning
severity: high
description: Checks for XML attributes embedded in tool descriptions that smuggle hidden instructions to the LLM. Attributes
  such as data-instruction, aria-label, or custom attributes within XML/HTML tags can carry payloads that are processed by
  the LLM but not visible in rendered UI output.
risk_explanation: 'XML attributes in descriptions provide a covert channel for prompt injection. While the visible text of
  a description may appear benign, XML attributes can carry full instruction sets that the LLM parses and follows. This technique
  bypasses content-based security filters that only examine visible text content.

  '
remediation: '1. Parse and strip all XML/HTML attributes from tool descriptions before presenting them to the LLM.

  2. Implement a strict content policy that rejects descriptions containing markup with attributes.

  3. Use plain- text-only description policies.

  4. Flag descriptions containing XML/HTML tag patterns for manual review.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP02:2025
tags:
- tool_poisoning
