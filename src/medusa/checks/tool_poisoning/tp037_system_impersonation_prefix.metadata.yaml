check_id: tp037
title: Detect system impersonation prefixes in tool descriptions
category: tool_poisoning
severity: critical
description: >-
  Detects system role impersonation prefixes in tool or parameter descriptions
  such as "System:", "[SYSTEM]", "ADMIN:", and ChatML markers. These patterns
  attempt to override LLM safety behavior by impersonating system-level messages
  as described in the Direct Prompt Injection TTP.
risk_explanation: >-
  System impersonation prefixes in tool descriptions can cause LLMs to treat
  the embedded text as authoritative system instructions rather than untrusted
  tool metadata. This enables attackers to override safety guardrails, change
  model behavior, or inject new system-level directives through tool registration.
remediation: >-
  1. Strip all role-prefix patterns from tool descriptions during registration.
  2. Implement validation that rejects descriptions containing system impersonation markers.
  3. Use content security policies that flag ChatML and role-play markers in metadata.
  4. Review tool descriptions for any text that mimics system prompts.
references:
  - https://modelcontextprotocol-security.io/ttps/prompt-injection/direct-prompt-injection/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - system_impersonation
  - direct_injection
  - chatml
  - ttp_based
