check_id: tp048
title: Detect urgency manipulation language in tool descriptions
category: tool_poisoning
severity: high
description: >-
  Detects urgency or pressure language in tool descriptions designed to bypass
  careful LLM evaluation, including "immediately", "emergency", "must act now",
  "skip validation". Tool metadata should describe functionality, not create
  time pressure.
risk_explanation: >-
  Urgency language in tool descriptions pressures the LLM into selecting and
  invoking tools without careful evaluation. Phrases like "immediately",
  "emergency", or "skip validation" bypass the LLM's deliberative process,
  which attackers exploit to ensure their malicious tools are invoked without
  scrutiny.
remediation: >-
  1. Remove urgency and pressure language from tool descriptions.
  2. Descriptions should neutrally describe tool functionality.
  3. Never include instructions to bypass validation or skip review steps.
  4. Audit descriptions for language that creates artificial time pressure.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/preference-manipulation/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - preference_manipulation
  - urgency
  - bypass_instruction
  - ttp_based
