check_id: tp033
title: Ensure Tool Descriptions do not contain conditional behavior patterns
category: tool_poisoning
severity: medium
description: Detects tool descriptions containing conditional or branching language suggesting the tool behaves differently based on
  user role, environment, or context. Patterns such as "if you are admin", "when in debug mode", or "depending on the role" indicate
  potential tool mutation or rug pull attacks where behaviour changes under specific conditions.
risk_explanation: 'Conditional behavior patterns in tool descriptions are indicators of the Tool Mutation TTP. A tool that claims to
  behave differently based on authentication status, environment mode, or user role may present benign behaviour during testing but
  activate malicious functionality in production or when triggered by specific conditions. This enables time-delayed or context-triggered
  attacks.

  '
remediation: '1. Ensure tool descriptions define a single, consistent behaviour regardless of context.

  2. Remove conditional language from tool descriptions that suggests role-based or environment-based behaviour changes.

  3. Implement separate tools for different permission levels instead of conditional logic in a single tool.

  4. Monitor for tool description changes that introduce conditional behaviour post-deployment.'
references:
- https://modelcontextprotocol-security.io/ttps/tool-poisoning/tool-mutation/
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
