check_id: tp028
title: Unicode Homoglyph in Identifiers
category: tool_poisoning
severity: critical
description: >
  Detects non-ASCII characters in tool names and parameter names. Attackers
  use Unicode homoglyphs (e.g. Cyrillic characters that look identical to
  Latin letters) or zero-width characters to create tool names that appear
  identical to legitimate tools but are functionally different, enabling
  impersonation and shadowing attacks.
risk_explanation: >
  Unicode homoglyph attacks exploit the visual similarity between characters
  from different scripts. A tool named with Cyrillic 'a' (U+0430) instead
  of Latin 'a' (U+0061) appears identical in most UIs but is treated as a
  completely different tool by the system. This enables an attacker to
  register a malicious tool that shadows a legitimate one, intercepting
  all calls intended for the real tool. Zero-width characters are even
  more dangerous as they are completely invisible.
remediation: >
  Reject tool and parameter names containing non-ASCII characters. Implement
  Unicode normalization (NFKC) and confusable detection using the Unicode
  Security Mechanisms (UTS#39). Strip zero-width characters from all
  identifiers. Warn users when tool names contain characters from multiple
  Unicode scripts (mixed-script detection).
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/tools"
  - "https://unicode.org/reports/tr39/"
owasp_mcp:
  - "MCP02:2025"
tags:
  - tool_poisoning
  - unicode
  - homoglyph
  - impersonation
  - zero_width
