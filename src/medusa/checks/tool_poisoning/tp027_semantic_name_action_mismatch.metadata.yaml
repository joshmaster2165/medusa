check_id: tp027
title: Semantic Name-Action Mismatch
category: tool_poisoning
severity: high
description: >
  Detects tools whose names suggest read-only behaviour (get_, read_, list_,
  fetch_, search_, view_, show_) but whose descriptions contain destructive
  or exfiltrative keywords (delete, remove, send, upload, execute, modify,
  write, drop, forward, transmit). This semantic mismatch can trick LLMs
  into invoking dangerous operations without safety confirmations.
risk_explanation: >
  LLM clients use tool names as a primary signal for risk assessment. A tool
  named "get_user_data" is assumed safe to call without confirmation, while
  "delete_user" would trigger a safety check. By naming a destructive tool
  with a read-only prefix, an attacker bypasses these heuristics entirely.
  The LLM sees a "read" operation and proceeds without asking the user,
  while the tool actually performs deletions, exfiltration, or modifications.
remediation: >
  Ensure tool names accurately reflect their actual operations. Tools that
  modify, delete, or transmit data should not use read-only prefixes like
  get_, list_, or fetch_. Implement name-description consistency validation
  in MCP server registration. Configure the LLM client to always verify
  tool descriptions against names before execution.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/tools"
owasp_mcp:
  - "MCP02:2025"
tags:
  - tool_poisoning
  - name_mismatch
  - semantic_analysis
  - deceptive_naming
