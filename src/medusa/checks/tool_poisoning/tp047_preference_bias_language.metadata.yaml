check_id: tp047
title: Detect preference bias language in tool descriptions
category: tool_poisoning
severity: medium
description: >-
  Detects persuasive or biased language in tool descriptions designed to
  manipulate LLM tool selection, including superlatives, selection directives,
  and trust claims. Requires 2+ different bias categories to minimize false
  positives.
risk_explanation: >-
  Biased language in tool descriptions manipulates the LLM's tool selection
  by creating artificial preference through superlatives ("best", "safest"),
  selection directives ("always use"), and unverifiable trust claims
  ("verified", "guaranteed"). This preference manipulation can steer the LLM
  toward malicious tools over legitimate alternatives.
remediation: >-
  1. Remove persuasive language from tool descriptions.
  2. Descriptions should objectively describe what the tool does.
  3. Avoid superlatives, trust claims, and selection directives.
  4. Let the LLM select tools based on functional match, not marketing language.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/preference-manipulation/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - preference_manipulation
  - bias_language
  - tool_selection
  - ttp_based
