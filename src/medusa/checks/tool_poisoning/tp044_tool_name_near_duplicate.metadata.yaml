check_id: tp044
title: Detect near-duplicate tool names suggesting typosquatting
category: tool_poisoning
severity: high
description: >-
  Detects pairs of tools on the same server whose names are suspiciously
  similar (Levenshtein distance of 1-2 characters). This pattern suggests
  potential typosquatting attacks as described in the Tool Name Conflict TTP.
risk_explanation: >-
  Near-duplicate tool names allow attackers to register tools that are visually
  similar to legitimate ones, tricking the LLM or user into invoking the wrong
  tool. A tool named "read_flle" alongside "read_file" may go unnoticed but
  execute entirely different and potentially malicious operations, enabling
  data theft or unauthorized actions.
remediation: >-
  1. Enforce minimum edit distance requirements between tool names on the same server.
  2. Review and remove tools with names that closely resemble existing tools.
  3. Implement tool name validation that rejects registrations too similar to existing names.
  4. Audit tool pairs with similar names for behavioral differences that may indicate malicious intent.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/tool-name-conflict/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - tool_name_conflict
  - typosquatting
  - near_duplicate
  - ttp_based
