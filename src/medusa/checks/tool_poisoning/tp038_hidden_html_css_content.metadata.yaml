check_id: tp038
title: Detect hidden HTML/CSS content in tool descriptions
category: tool_poisoning
severity: high
description: >-
  Detects HTML/CSS techniques that hide content from visual display in tool
  or parameter descriptions, including display:none, visibility:hidden,
  opacity:0, font-size:0, and the HTML hidden attribute. These enable
  steganographic instruction hiding as described in the Hidden Instructions TTP.
risk_explanation: >-
  Hidden HTML/CSS content in tool descriptions allows attackers to embed
  instructions that are invisible to users reviewing tool metadata but are
  fully processed by LLMs. This creates a steganographic channel for prompt
  injection that bypasses visual security review of tool descriptions.
remediation: >-
  1. Strip all HTML/CSS from tool descriptions during registration.
  2. Implement content security policies that reject style attributes in metadata.
  3. Use plain text rendering for tool descriptions to prevent CSS-based hiding.
  4. Audit tool descriptions for any HTML tags or style attributes.
references:
  - https://modelcontextprotocol-security.io/ttps/prompt-injection/hidden-instructions/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - hidden_content
  - css_hiding
  - steganography
  - ttp_based
