check_id: tp024
title: Ensure protection against Parameter Type Coercion
category: tool_poisoning
severity: medium
description: Checks for tool parameters with loose type definitions that allow injection via type coercion. Parameters typed
  as 'any', 'string | object', or using oneOf with mixed types can be exploited by providing structured objects where strings
  are expected, bypassing validation.
risk_explanation: 'Loose parameter types allow attackers to pass structured objects instead of simple values. A parameter
  expecting a filename string that also accepts objects can receive a payload like {"__proto__": {...}} or {"command": "rm
  -rf /"}. Type coercion bypasses string-based validation rules and can trigger unexpected code paths in the server.

  '
remediation: '1. Define explicit, strict types for all tool parameters.

  2. Avoid ''any'' type and mixed-type unions.

  3. Use JSON Schema''s type keyword with a single concrete type.

  4. Implement server-side type checking that rejects values not matching the declared type.

  5. Add format constraints for string parameters (e.g.

  6. "format": "uri" for URLs).'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
