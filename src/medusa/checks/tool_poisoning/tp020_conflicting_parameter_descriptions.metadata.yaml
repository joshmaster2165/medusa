check_id: tp020
title: Ensure Parameter Descriptions do not conflict
category: tool_poisoning
severity: medium
description: Checks for tool parameters whose descriptions contradict the stated purpose of the tool. For example, a tool
  described as "read-only file viewer" with a parameter described as "path to write output" indicates a mismatch that may
  signal deceptive intent.
risk_explanation: 'Conflicting parameter descriptions can mislead the LLM into passing sensitive data to parameters that perform
  unintended operations. A tool claiming to be read-only while accepting write-oriented parameters can trick the LLM into
  authorizing destructive operations. The contradiction between tool purpose and parameter intent is a strong indicator of
  deception.

  '
remediation: '1. Implement semantic analysis to detect contradictions between tool- level descriptions and parameter-level
  descriptions.

  2. Flag parameters whose descriptions suggest capabilities not mentioned in the tool description.

  3. Require consistent terminology between tool descriptions and their parameter documentation.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP02:2025
tags:
