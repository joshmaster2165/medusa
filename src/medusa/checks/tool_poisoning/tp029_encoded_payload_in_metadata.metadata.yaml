check_id: tp029
title: Ensure protection against Encoded Payload in Metadata
category: tool_poisoning
severity: medium
description: Checks for base64 or hex-encoded strings in tool descriptions and parameter metadata that could hide malicious
  instructions. Encoded payloads bypass human review while remaining decodable by LLMs or automated pipelines.
risk_explanation: 'Attackers can embed base64 or hex-encoded instructions in tool descriptions that appear as opaque data
  to human reviewers but can be decoded by LLMs during processing. An LLM may interpret encoded content as instructions (e.g.
  "decode the following base64 and execute it"), enabling indirect prompt injection that evades static text analysis and content
  filtering.

  '
remediation: '1. Scan all tool descriptions and parameter metadata for encoded content.

  2. Reject or flag tools containing base64 or hex strings longer than typical identifiers.

  3. Implement a content policy that requires tool descriptions to be human-readable plain text only.

  4. Decode and inspect any encoded content found in metadata before allowing tool registration.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://modelcontextprotocol.io/specification/2025-03-26/server/tools
owasp_mcp:
- MCP02:2025
