check_id: tp054
title: Detect brand/service impersonation in tool names
category: tool_poisoning
severity: high
description: >-
  Detects well-known brand or service names in tool names that may indicate
  impersonation of established services. A tool named "google_search" or
  "github_api" on an unrelated server may be attempting to impersonate
  legitimate integrations to gain trust.
risk_explanation: >-
  Tool impersonation leverages trust in well-known brands to trick the LLM
  into selecting a malicious tool. A tool named after a trusted service
  (e.g., "google_search", "slack_send") on an unrelated MCP server is
  likely impersonating that service to intercept sensitive data or
  execute malicious operations.
remediation: >-
  1. Verify the provenance of tools using brand names.
  2. Official integrations should come from verified sources.
  3. Remove brand names from tool names if the tool is not an official integration.
  4. Implement server-level verification for tools claiming brand affiliation.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/tool-impersonation/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - tool_impersonation
  - brand_impersonation
  - trust_exploitation
  - ttp_based
