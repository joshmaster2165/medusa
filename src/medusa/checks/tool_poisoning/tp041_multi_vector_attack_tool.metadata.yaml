check_id: tp041
title: Detect tools with multiple independent attack signals
category: tool_poisoning
severity: critical
description: >-
  Meta-check that flags tools exhibiting two or more independent attack signal
  categories including injection phrases, dangerous parameter names, suspicious
  defaults, and encoding bypass patterns. Any single signal could be benign but
  multiple independent signals indicate a likely malicious tool.
risk_explanation: >-
  Tools that combine multiple attack vectors are significantly more likely to
  be malicious than those exhibiting a single suspicious pattern. A tool with
  both injection phrases in its description AND dangerous parameter names, or
  encoding bypass patterns AND suspicious defaults, represents a coordinated
  attack that is unlikely to occur naturally in legitimate tools.
remediation: >-
  1. Immediately quarantine and review tools flagged with multiple attack signals.
  2. Audit each flagged signal category independently for malicious intent.
  3. Remove or replace tools that combine injection patterns with dangerous parameters.
  4. Implement defense-in-depth by blocking tools with any combination of attack signals.
references:
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - multi_vector
  - meta_check
  - combinatorial_analysis
  - attack_signals
