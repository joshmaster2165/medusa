check_id: tp034
title: Ensure Tool Descriptions do not contain jailbreak patterns
category: tool_poisoning
severity: critical
description: Detects jailbreak-style prompt overrides embedded in tool or parameter descriptions such as DAN mode, developer mode,
  unrestricted mode, or bypass safety/filter patterns. These are direct attempts to override the LLM safety guardrails through tool
  metadata, as described in the Prompt Injection Jailbreak TTP.
risk_explanation: 'Jailbreak patterns in tool descriptions are high-confidence indicators of malicious intent. They attempt to
  place the LLM into an unrestricted mode where it ignores safety policies, enabling the attacker to use the LLM for harmful
  actions including data exfiltration, privilege escalation, or generating dangerous content. Unlike hidden instructions which
  are concealed, jailbreak patterns directly command the LLM to disable its safety mechanisms.

  '
remediation: '1. Reject tool registrations containing jailbreak patterns in descriptions or parameter metadata.

  2. Implement content filtering that blocks known jailbreak phrases before they reach the LLM context.

  3. Use description allowlists for trusted tools and reject descriptions that deviate from expected patterns.

  4. Monitor tool description changes for newly introduced jailbreak language.'
references:
- https://modelcontextprotocol-security.io/ttps/prompt-injection/indirect-prompt-injection/
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP03:2025
- MCP06:2025
tags:
- jailbreak
- prompt_injection
- safety_bypass
- ttp_based
