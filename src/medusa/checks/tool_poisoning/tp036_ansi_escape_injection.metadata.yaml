check_id: tp036
title: Detect ANSI escape injection in tool descriptions
category: tool_poisoning
severity: high
description: >-
  Detects ANSI/terminal escape sequences in tool or parameter descriptions.
  These control characters can hide malicious instructions from terminal display
  while remaining visible to LLMs, enabling steganographic prompt injection
  as described in the ANSI Escape Injection TTP.
risk_explanation: >-
  ANSI escape sequences embedded in tool descriptions can manipulate terminal
  output to hide content from human review. The LLM processes the full text
  including hidden portions, allowing attackers to inject instructions that are
  invisible in terminal-based MCP clients but still influence model behavior.
remediation: >-
  1. Strip all ANSI escape sequences from tool descriptions before registration.
  2. Implement input validation that rejects control characters in metadata fields.
  3. Use a terminal-safe rendering pipeline that neutralizes escape sequences.
  4. Audit tool descriptions for non-printable characters.
references:
  - https://modelcontextprotocol-security.io/ttps/prompt-injection/ansi-escape-injection/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - ansi_escape
  - terminal_injection
  - steganography
  - ttp_based
