check_id: tp050
title: Detect conditional tool selection directives in descriptions
category: tool_poisoning
severity: high
description: >-
  Detects conditional selection instructions embedded in tool descriptions that
  manipulate LLM tool selection, such as "if unsure, use this tool", "default
  to this tool", or "no need to verify". These directives are a direct attack
  on the LLM's decision-making process.
risk_explanation: >-
  Selection directives embedded in tool descriptions hijack the LLM's
  decision-making by exploiting uncertainty ("if unsure, use this"),
  claiming default status, or instructing the LLM to bypass validation.
  This is a form of metadata prompt injection that directly manipulates
  which tools the LLM selects.
remediation: >-
  1. Remove selection directives from tool descriptions.
  2. Tool descriptions should describe capabilities, not instruct the LLM on selection.
  3. Tool selection should be based on functional match to user intent.
  4. Audit descriptions for embedded instructions targeting the LLM's decision process.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/metadata-prompt-injection/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - metadata_prompt_injection
  - selection_directive
  - tool_selection
  - ttp_based
