check_id: tp040
title: Detect indirect prompt injection via fetch tool patterns
category: tool_poisoning
severity: high
description: >-
  Detects tools designed to fetch or retrieve external content whose descriptions
  also direct the LLM to process, execute, or follow instructions from the
  fetched content. This combinatorial pattern indicates an indirect prompt
  injection vector as described in the Indirect Prompt Injection TTP.
risk_explanation: >-
  When a fetch tool's description instructs the LLM to execute or follow
  instructions found in retrieved content, it creates a direct pathway for
  indirect prompt injection. Attackers can place malicious instructions in
  external resources that the tool fetches, and the processing directive
  ensures the LLM will treat that content as actionable instructions.
remediation: >-
  1. Remove processing directives from fetch tool descriptions.
  2. Ensure fetched content is treated as untrusted data, never as instructions.
  3. Implement content sanitization between fetch and processing stages.
  4. Separate data retrieval tools from content processing tools.
references:
  - https://modelcontextprotocol-security.io/ttps/prompt-injection/indirect-prompt-injection/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - indirect_injection
  - fetch_pattern
  - content_processing
  - ttp_based
