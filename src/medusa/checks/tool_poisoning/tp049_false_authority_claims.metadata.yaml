check_id: tp049
title: Detect false authority claims in tool descriptions
category: tool_poisoning
severity: high
description: >-
  Detects false authority or endorsement claims in tool descriptions such as
  "admin-approved", "security-team recommended", or "SOC 2 certified". These
  authority claims cannot be verified through MCP metadata and may be used in
  preference manipulation attacks.
risk_explanation: >-
  Authority claims in MCP tool metadata are self-reported and unverifiable.
  Attackers embed claims like "admin-approved" or "SOC 2 certified" to
  create false trust, influencing the LLM to prefer their malicious tool
  over legitimate alternatives. Since MCP has no built-in verification
  mechanism, these claims cannot be trusted.
remediation: >-
  1. Remove unverifiable authority claims from tool descriptions.
  2. Compliance and certification status should be verified through proper channels.
  3. Do not assert organizational approval in tool metadata.
  4. Implement server-level trust verification rather than relying on self-reported claims.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/preference-manipulation/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - preference_manipulation
  - false_authority
  - trust_claim
  - ttp_based
