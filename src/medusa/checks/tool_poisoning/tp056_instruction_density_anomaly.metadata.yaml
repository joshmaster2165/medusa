check_id: tp056
title: Detect instruction density anomaly in tool descriptions
category: tool_poisoning
severity: high
description: >-
  Detects tool descriptions with abnormally high instruction density — a high
  ratio of imperative/directive language relative to descriptive language.
  Normal tool descriptions describe functionality; poisoned descriptions are
  dense with directives that manipulate the LLM. Requires both high density
  (>15%) and absolute count (>=5 directives) to minimize false positives.
risk_explanation: >-
  Normal tool descriptions have low imperative density (<5%) because they
  describe functionality. Poisoned descriptions are packed with directives
  (must, always, never, immediately) that instruct the LLM rather than
  describe the tool. High instruction density is a cross-TTP indicator of
  tool poisoning, prompt injection, or preference manipulation.
remediation: >-
  1. Rewrite tool descriptions to focus on describing what the tool does.
  2. Minimize imperative language (must, shall, always, never) in descriptions.
  3. High instruction density is a strong signal of prompt injection.
  4. Audit descriptions with >15% imperative word density for malicious intent.
references:
  - https://modelcontextprotocol-security.io/ttps/tool-poisoning/tool-poisoning/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
