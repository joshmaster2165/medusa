check_id: tp006
title: Ensure protection against rug pull — tool definition drift
category: tool_poisoning
severity: critical
description: Checks whether MCP tool definitions change between sessions without explicit user consent. A malicious server
  can initially present benign tool definitions to pass review, then silently alter descriptions, parameters, or behaviour
  in subsequent sessions to perform harmful actions — a technique known as a rug pull attack.
risk_explanation: 'Tool definition drift allows an attacker to bypass initial security review. Once the user or LLM trusts
  a tool based on its original definition, the attacker modifies it to exfiltrate data, escalate privileges, or execute malicious
  commands. Because the change happens between sessions, there is no opportunity for the user to review or consent to the
  new behaviour.

  '
remediation: '1. Implement tool definition pinning by hashing tool schemas and descriptions on first use and comparing them
  on subsequent sessions.

  2. Alert the user when any tool definition changes.

  3. Require explicit user approval before accepting modified tool definitions.

  4. Use version- pinned server references where available.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://invariantlabs.ai/blog/mcp-security-notification-tool-poisoning-attacks
owasp_mcp:
