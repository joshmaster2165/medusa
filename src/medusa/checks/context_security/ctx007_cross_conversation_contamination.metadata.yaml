check_id: ctx007
title: Ensure protection against cross-conversation context contamination
category: context_security
severity: high
description: Checks the MCP server for implementations that allow data from one conversation session to leak into another.
  Cross-conversation contamination violates session isolation and exposes user data.
risk_explanation: 'When data from one user''s conversation leaks into another user''s session, private information, tool invocation
  results, and conversation context are exposed to unauthorized parties. This can occur through shared caches, persistent
  state, or improper session management in the MCP server.

  '
remediation: '1. Implement strict session isolation in the MCP server.

  2. Use separate state stores for each conversation session and clear all session data when a conversation ends.

  3. Avoid shared caches that span sessions.

  4. Validate session boundaries in all tool invocations and resource accesses.

  5. Conduct regular testing for cross-session data leakage.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
