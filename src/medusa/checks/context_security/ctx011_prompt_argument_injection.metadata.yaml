check_id: ctx011
title: Ensure Prompt Arguments do not create injection vectors
category: context_security
severity: high
description: Detects prompt template arguments with dangerous names (command, query, path, url, code, sql) that become injection vectors
  when user-controlled values flow into tool invocations without validation. This maps to the Indirect Prompt Injection TTP where
  external data sources inject instructions through prompt argument channels.
risk_explanation: 'Prompt arguments with names like "command", "query", or "code" that lack described validation create direct injection
  channels. When a user or external source supplies a value for these arguments, the content may be passed directly to tool invocations,
  enabling command injection, SQL injection, or prompt manipulation through the prompt template layer.

  '
remediation: '1. Add input validation descriptions to all prompt arguments that accept potentially dangerous content.

  2. Implement server-side sanitization for prompt arguments before they flow into tool calls.

  3. Use typed argument schemas with enum constraints where possible instead of free-form strings.

  4. Avoid naming prompt arguments with terms that suggest direct execution contexts (command, exec, eval).'
references:
- https://modelcontextprotocol-security.io/ttps/prompt-injection/indirect-prompt-injection/
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
- MCP05:2025
tags:
- prompt_injection
- indirect_injection
- prompt_arguments
- ttp_based
