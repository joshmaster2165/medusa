check_id: ctx009
title: Ensure protection against Role Confusion attack
category: context_security
severity: high
description: Checks for MCP tool outputs containing content designed to confuse the LLM's understanding of message roles (system,
  user, assistant, tool). Role confusion can trick the LLM into treating tool output as system instructions.
risk_explanation: 'LLMs process messages based on their assigned roles. If tool output can trick the LLM into believing it
  is receiving system-level instructions or user messages, the attacker effectively escalates the privilege of their content.
  This enables bypassing safety controls, impersonating users, and overriding behavioral constraints.

  '
remediation: '1. Implement strict role tagging that cannot be overridden by message content.

  2. Sanitize tool outputs to remove role-indicator patterns such as "System:", "User:", or role-switching markers.

  3. Use structural message formatting that separates role metadata from content.

  4. Validate message roles at the client level before passing to the LLM.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
- MCP06:2025
tags:
- context_security
- role_confusion
- privilege_escalation
- prompt_injection
