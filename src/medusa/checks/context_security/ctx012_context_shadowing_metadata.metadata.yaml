check_id: ctx012
title: Detect context shadowing patterns in tool metadata
category: context_security
severity: high
description: >-
  Detects tool descriptions that attempt to shadow the LLM's context by
  fabricating prior tool results, user preferences, environment state, or
  conversation history. This manipulates the model's reasoning through forged
  contextual metadata as described in the Context Shadowing TTP.
risk_explanation: >-
  Context shadowing through tool metadata allows attackers to influence LLM
  decision-making by injecting fabricated context. Phrases like "the user
  confirmed" or "previous tool returned" create false premises that the model
  may accept as ground truth, leading to unauthorized actions or data exposure
  based on forged context.
remediation: >-
  1. Validate that tool descriptions do not contain assertions about prior context.
  2. Implement context integrity checks that cross-reference claims against actual history.
  3. Strip declarative statements about user intent or prior results from tool metadata.
  4. Use structured metadata formats that separate tool functionality from contextual claims.
references:
  - https://modelcontextprotocol-security.io/ttps/prompt-injection/context-shadowing/
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP04:2025
tags:
  - context_shadowing
  - context_manipulation
  - fake_context
  - ttp_based
