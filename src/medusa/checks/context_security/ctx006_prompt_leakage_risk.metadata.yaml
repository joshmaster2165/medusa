check_id: ctx006
title: Ensure protection against System Prompt Leakage
category: context_security
severity: high
description: Checks for MCP tool behaviors or output patterns that could cause the LLM to reveal its system prompt or internal
  instructions. System prompt leakage exposes security controls and business logic.
risk_explanation: 'System prompts contain security directives, behavioral constraints, and business logic that should remain
  confidential. If a tool can trick the LLM into revealing its system prompt, attackers learn the exact safety measures in
  place and can craft targeted bypass techniques. This is often the first step in a more sophisticated attack chain.

  '
remediation: '1. Implement system prompt protection that prevents the LLM from including system prompt content in responses.

  2. Filter tool outputs for content that could elicit prompt disclosure.

  3. Add explicit system prompt protection directives.

  4. Monitor for prompt leakage attempts and alert on suspicious extraction patterns.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP10:2025
tags:
