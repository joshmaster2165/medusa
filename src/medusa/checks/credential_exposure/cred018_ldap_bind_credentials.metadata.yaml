check_id: cred018
title: Ensure LDAP Bind Credential is not exposed
category: credential_exposure
severity: high
description: Checks for LDAP bind DN (Distinguished Name) and password in MCP server configuration. LDAP bind credentials
  authenticate the application to the directory server, often with broad read access to the entire directory tree.
risk_explanation: 'Exposed LDAP bind credentials grant directory read access, enabling enumeration of all users, groups, organizational
  units, and their attributes. In Active Directory environments, this includes password hashes, email addresses, phone numbers,
  and group memberships. Write access allows modifying directory entries and group memberships.

  '
remediation: '1. Store LDAP bind credentials in a secrets manager.

  2. Use service accounts with minimal required permissions (read-only, limited base DN).

  3. Implement LDAP connection pooling to minimize credential exposure.

  4. Use SASL/ Kerberos authentication instead of simple bind where possible.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
tags:
