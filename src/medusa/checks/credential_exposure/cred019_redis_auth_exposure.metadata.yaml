check_id: cred019
title: Ensure Redis Auth is not exposed
category: credential_exposure
severity: high
description: Checks for Redis AUTH passwords in connection strings or MCP server configuration. Redis credentials in configuration
  files grant access to cached data, session stores, and potentially the entire key-value store.
risk_explanation: 'Exposed Redis credentials grant access to all data stored in the Redis instance, which frequently includes
  session tokens, cached credentials, rate limiting state, and application data. Redis commands like CONFIG and DEBUG can
  be used for further exploitation, including writing files to the server filesystem.

  '
remediation: '1. Store Redis passwords in secrets managers.

  2. Use ACL-based authentication with minimal permissions.

  3. Enable TLS for Redis connections.

  4. Restrict dangerous Redis commands (CONFIG, DEBUG, EVAL) using ACL rules.

  5. Implement network-level access controls to limit Redis connectivity.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
