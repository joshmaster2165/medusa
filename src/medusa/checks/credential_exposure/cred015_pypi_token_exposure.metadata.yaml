check_id: cred015
title: Ensure PyPI Token is not exposed
category: credential_exposure
severity: high
description: Checks for PyPI API tokens in configuration files, .pypirc, or environment variables. PyPI tokens grant permissions
  to upload Python packages to the Python Package Index.
risk_explanation: 'Exposed PyPI tokens allow an attacker to upload malicious versions of Python packages. This is a direct
  supply chain attack vector, as downstream users who install the package receive the compromised code. PyPI tokens typically
  have project-scoped or account-wide upload permissions.

  '
remediation: '1. Use scoped API tokens instead of account-wide tokens for PyPI uploads.

  2. Store tokens in CI/CD secrets management.

  3. Rotate tokens after any potential exposure.

  4. Enable two-factor authentication on PyPI accounts.

  5. Use trusted publishers (OIDC-based publishing) for CI/CD pipelines.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
tags:
- credential_exposure
- pypi
