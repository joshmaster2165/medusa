check_id: cred016
title: Ensure Encryption Key is not exposed
category: credential_exposure
severity: critical
description: Checks for symmetric or asymmetric encryption keys in MCP server configuration. Exposed encryption keys compromise
  the confidentiality of all data encrypted with those keys, including stored data and communications.
risk_explanation: 'An exposed encryption key allows an attacker to decrypt all data protected by that key. For symmetric keys
  (AES, ChaCha20), this includes both encrypting new data and decrypting existing data. For asymmetric private keys, the attacker
  can decrypt communications and forge signatures. Historical encrypted data becomes retroactively compromised.

  '
remediation: '1. Store encryption keys in hardware security modules (HSMs) or key management services (AWS KMS, Azure Key
  Vault, GCP Cloud KMS).

  2. Never embed encryption keys in configuration files.

  3. Implement key rotation with re-encryption of stored data.

  4. Use envelope encryption where the data encryption key is itself encrypted by a master key.'
references:
- https://owasp.org/www-project-mcp-top-10/
