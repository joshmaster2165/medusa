check_id: cred008
title: Ensure JWT secret is not present in environment variables
category: credential_exposure
severity: high
description: Checks for JWT signing secrets stored in environment variables or configuration files. The JWT secret is the
  root of trust for token verification; its exposure allows an attacker to forge arbitrary valid tokens.
risk_explanation: 'The JWT signing secret enables creation of tokens with any claims, including admin roles and any user identity.
  An attacker who obtains the secret can bypass all authentication and authorization by forging tokens. The compromise is
  silent because forged tokens are indistinguishable from legitimate ones.

  '
remediation: '1. Store JWT secrets in dedicated secrets managers (HashiCorp Vault, AWS Secrets Manager).

  2. Use asymmetric signing algorithms (RS256, ES256) where only the public key needs to be distributed.

  3. Rotate signing secrets regularly with overlap periods for token migration.

  4. Never commit JWT secrets to version control.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
