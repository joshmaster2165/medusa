check_id: cred009
title: Ensure OAuth Client Secret is not exposed
category: credential_exposure
severity: high
description: Checks for OAuth client secrets in MCP server configuration files. OAuth client secrets authenticate the application
  to the authorization server and should never be exposed in client-side or plaintext configuration.
risk_explanation: 'An exposed OAuth client secret allows an attacker to impersonate the legitimate application to the authorization
  server. The attacker can exchange authorization codes for access tokens, request new tokens, and perform all API operations
  as the legitimate application. This compromises all users who have authorized the application.

  '
remediation: '1. Store OAuth client secrets in secrets managers.

  2. Use environment variable references in configuration files.

  3. For public clients (SPAs, mobile apps), use PKCE without client secrets.

  4. Rotate client secrets regularly and monitor for unauthorized token issuance.

  5. Never include client secrets in client-side code or public repositories.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
tags:
