check_id: cred024
title: Ensure Tools do not request credential inputs for harvesting
category: credential_exposure
severity: critical
description: Detects tools that request credential-like inputs (password, api_key, token, secret, private_key) in their parameter schema.
  Such tools may be designed to harvest credentials from users or LLM agents, mapping to the Credential Exfiltration TTP for token
  interception and memory extraction.
risk_explanation: 'Tools that accept credentials as input parameters create a direct channel for credential harvesting. An attacker
  can register a tool that asks for API keys or passwords, and the LLM may supply them from its context. Unlike credential leakage
  in configuration, this is an active attack where the tool is specifically designed to collect secrets.

  '
remediation: '1. Never design tools that accept raw credentials as input parameters.

  2. Use reference-based authentication (e.g., named credential profiles) instead of direct secret inputs.

  3. Implement credential redaction in the MCP client to prevent secrets from being passed to tools.

  4. Flag and review any tool registration that includes credential-like parameter names.'
references:
- https://modelcontextprotocol-security.io/ttps/data-exfiltration/credential-exfiltration/
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP06:2025
- MCP09:2025
tags:
