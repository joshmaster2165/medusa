check_id: cred013
title: Ensure Terraform state does not contain secrets
category: credential_exposure
severity: critical
description: Checks for secrets leaked through Terraform state files referenced in MCP server configuration. Terraform state
  files contain plaintext values of all managed resources, including database passwords, API keys, and private keys.
risk_explanation: 'Terraform state files store the complete state of managed infrastructure in plaintext JSON, including all
  resource attributes. Database passwords, encryption keys, and API tokens in state files are stored unencrypted. Access to
  a state file grants visibility into the entire infrastructure, including credential values that were intended to be secret.

  '
remediation: '1. Store Terraform state in encrypted remote backends (S3 with encryption, Terraform Cloud).

  2. Enable state encryption at rest.

  3. Use sensitive variables and mark outputs as sensitive.

  4. Restrict state file access using IAM policies.

  5. Never reference Terraform state files directly in MCP configuration.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
tags:
