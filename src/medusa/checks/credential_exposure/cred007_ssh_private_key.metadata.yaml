check_id: cred007
title: Ensure SSH Private Key is not exposed
category: credential_exposure
severity: critical
description: Checks for SSH private keys in MCP server environment variables or configuration files. SSH private keys provide
  direct server access and are frequently used for deployment, git operations, and remote server management.
risk_explanation: 'An exposed SSH private key grants the attacker direct shell access to any server that trusts the corresponding
  public key. SSH access typically provides full system-level privileges. Private keys embedded in configuration are often
  shared across team members and environments, making the compromise scope extremely broad.

  '
remediation: '1. Never embed SSH private keys in configuration files or environment variables.

  2. Use SSH agent forwarding or deploy keys with minimal permissions.

  3. Store SSH keys with passphrase protection in secure locations.

  4. Use short-lived SSH certificates instead of static keys where possible.

  5. Rotate SSH keys regularly.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
