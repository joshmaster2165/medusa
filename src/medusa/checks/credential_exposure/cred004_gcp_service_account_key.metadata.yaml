check_id: cred004
title: Ensure GCP Service Account Key is not exposed
category: credential_exposure
severity: critical
description: Checks for Google Cloud Platform service account JSON key files in MCP server configuration or environment. GCP
  service account keys contain private keys that grant full access to the associated cloud project resources and APIs.
risk_explanation: 'GCP service account JSON keys provide persistent, non-expiring access to cloud resources. A leaked key
  grants the attacker the full permissions of the service account, which often includes access to Cloud Storage, BigQuery,
  Compute Engine, and other services. Unlike short-lived tokens, service account keys remain valid until explicitly revoked.

  '
remediation: '1. Use Workload Identity Federation or attached service accounts instead of JSON key files.

  2. If keys are required, store them in a secrets manager and reference them via environment variables.

  3. Rotate keys regularly and set up key expiration.

  4. Monitor for key usage anomalies.

  5. Delete unused service account keys.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cloud.google.com/iam/docs/best-practices-for-managing-service-account-keys
owasp_mcp:
- MCP01:2025
