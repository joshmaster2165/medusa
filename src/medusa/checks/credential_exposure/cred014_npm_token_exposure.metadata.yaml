check_id: cred014
title: Ensure NPM Token is not exposed
category: credential_exposure
severity: high
description: Checks for NPM authentication tokens in .npmrc files, environment variables, or MCP server configuration. NPM
  tokens grant permissions to publish, modify, and manage packages in the npm registry.
risk_explanation: 'An exposed NPM token allows an attacker to publish malicious versions of packages owned by the token holder.
  This enables supply chain attacks where downstream consumers automatically install compromised packages. The attacker can
  also access private packages, modify package metadata, and delete published versions.

  '
remediation: '1. Use npm token list to audit existing tokens.

  2. Revoke and rotate any exposed tokens immediately.

  3. Use granular automation tokens with minimal scopes for CI/CD.

  4. Store tokens in CI/CD secrets management, not in .npmrc files.

  5. Enable two-factor authentication on npm accounts.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
