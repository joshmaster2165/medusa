check_id: cred022
title: Ensure SendGrid API Key is not exposed
category: credential_exposure
severity: high
description: Checks for SendGrid API keys in MCP server configuration or environment. SendGrid API keys grant permissions
  to send emails, manage contacts, and access email analytics through the SendGrid platform.
risk_explanation: 'Exposed SendGrid API keys allow an attacker to send emails through the organization''s SendGrid account,
  bypassing email authentication (SPF, DKIM). The attacker can send phishing emails that appear to originate from the organization''s
  verified domains. Access to contact lists exposes customer email addresses and metadata.

  '
remediation: '1. Store SendGrid API keys in secrets managers.

  2. Use scoped API keys with minimal permissions (e.g.

  3. mail send only).

  4. Implement IP access management to restrict API key usage to known IP ranges.

  5. Monitor sending patterns for anomalies.

  6. Rotate API keys regularly.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
tags:
- credential_exposure
- sendgrid
