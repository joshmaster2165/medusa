check_id: hard006
title: Ensure debug endpoints are disabled
category: server_hardening
severity: info
description: Checks the MCP server for that expose debug or diagnostic endpoints in production deployments. Debug endpoints
  may include health checks with internal details, profiling endpoints, memory dumps, or configuration inspection endpoints
  that reveal sensitive internals.
risk_explanation: 'Debug endpoints expose internal server state, performance metrics, configuration details, memory contents,
  and execution traces. Attackers use this information to understand the server architecture, identify vulnerable components,
  extract secrets from memory dumps, and time attacks using profiling data. Some debug endpoints may even allow arbitrary
  code execution or configuration modification.

  '
remediation: '1. Disable all debug and diagnostic endpoints in production deployments.

  2. Implement environment checks that prevent debug endpoints from being registered in production mode.

  3. If health check endpoints are needed, limit them to basic availability status without internal details.

  4. Protect any remaining diagnostic endpoints with strong authentication and network-level restrictions.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
