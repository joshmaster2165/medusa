check_id: hard016
title: Debug Mode Indicators
category: server_hardening
severity: high
description: >
  Detects server configuration, environment variables, or launch
  arguments that suggest debug mode is enabled. Debug mode may expose
  sensitive internals such as stack traces, memory dumps, or verbose
  logging in production environments.
risk_explanation: >
  Debug mode in production environments exposes detailed error messages,
  stack traces, internal state, and potentially sensitive configuration
  to clients. Attackers can use this information to understand server
  internals, identify vulnerabilities, and craft targeted exploits.
  Debug output may also leak credentials, API keys, or internal
  network topology.
remediation: >
  Disable debug mode, verbose logging, and profiling in production
  deployments. Set NODE_ENV to "production" for Node.js servers.
  Remove debug flags (--debug, --verbose, -v, --dev) from launch
  arguments. Implement environment-specific configuration that
  automatically disables debug features in production. Use structured
  logging at appropriate levels instead of verbose debug output.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
owasp_mcp:
  - "MCP07:2025"
tags:
  - server_hardening
  - debug
  - configuration
