check_id: hard003
title: Ensure Security Headers are configured
category: server_hardening
severity: info
description: Checks the MCP server for using HTTP-based transports that do not set security-relevant response headers such
  as Content-Security-Policy, X-Content-Type-Options, Strict-Transport-Security, X-Frame-Options, and Cache-Control for sensitive
  responses.
risk_explanation: 'Missing security headers leave MCP clients vulnerable to content type sniffing attacks, clickjacking through
  iframe embedding, and insecure caching of sensitive responses. Without HSTS, connections can be downgraded from HTTPS to
  HTTP. Missing CSP allows injection of malicious scripts if MCP responses are rendered in web contexts.

  '
remediation: '1. Configure the MCP server HTTP transport to include all recommended security headers.

  2. Set Content-Security-Policy with a restrictive policy.

  3. Enable Strict-Transport-Security with a long max-age.

  4. Set X-Content-Type-Options to nosniff.

  5. Set Cache-Control to no-store for sensitive responses.

  6. Implement a security header middleware that applies headers consistently to all responses.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP03:2025
- MCP07:2025
