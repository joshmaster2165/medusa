check_id: hard008
title: Ensure Default Credentials meets security requirements
category: server_hardening
severity: critical
description: Checks the MCP server for that ship with default usernames, passwords, API keys, or tokens that are documented,
  predictable, or shared across all installations. Default credentials are the most common entry point for server compromise.
risk_explanation: 'Default credentials are publicly known and immediately exploited by automated scanning tools. Attackers
  maintain databases of default credentials for common software and continuously scan for servers using them. An MCP server
  with default credentials can be fully compromised within minutes of deployment, as no vulnerability exploitation is required,
  just authentication with known values.

  '
remediation: '1. Never ship MCP servers with default credentials.

  2. Force credential creation during initial setup with complexity requirements.

  3. Generate unique random credentials per installation if defaults are needed for bootstrapping.

  4. Implement first-run setup that requires credential change before the server accepts client connections.

  5. Detect and alert on use of known default credentials.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
