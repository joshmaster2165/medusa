check_id: hard001
title: Ensure unnecessary Services are disabled
category: server_hardening
severity: medium
description: Checks the MCP server for that expose capabilities, endpoints, or protocol features beyond what is required for
  their intended function. Each unnecessary service increases the attack surface and provides additional vectors for exploitation.
risk_explanation: 'Every enabled service or capability is a potential attack vector. Unnecessary MCP capabilities such as
  unused tool handlers, resource endpoints, or prompt definitions provide attackers with additional entry points to probe
  for vulnerabilities. Services that are enabled but not actively maintained are especially dangerous as they may contain
  unpatched security issues.

  '
remediation: '1. Audit all enabled MCP server capabilities and disable any that are not required for the server intended function.

  2. Remove unused tool definitions, resource handlers, and prompt endpoints.

  3. Apply the principle of least functionality by only enabling the minimum set of capabilities needed.

  4. Regularly review enabled services against actual usage patterns.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
