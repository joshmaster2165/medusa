check_id: hard013
title: Ensure Request Validation is configured
category: server_hardening
severity: info
description: Checks the MCP server for that do not validate the structure, content type, and size of incoming requests at
  the transport level before processing. Missing request validation allows malformed, oversized, or incorrectly typed requests
  to reach application logic.
risk_explanation: 'Without request validation, malformed requests can trigger parsing errors that crash the server or leak
  implementation details. Oversized requests can exhaust memory. Incorrectly typed content can exploit parser vulnerabilities.
  Missing validation at the transport level means each handler must independently validate requests, leading to inconsistent
  protection.

  '
remediation: '1. Implement request validation at the transport boundary that checks content type, content length, request
  structure, and character encoding before passing requests to handlers.

  2. Set maximum request size limits.

  3. Validate that request content matches the declared content type.

  4. Reject malformed requests with generic error messages.

  5. Log rejected requests for security monitoring.'
references:
- https://owasp.org/www-project-mcp-top-10/
