check_id: gov005
title: Ensure Incident Response Plan is configured
category: governance
severity: info
description: Verifies that the MCP server has a documented incident response plan for security events. Without an incident
  response plan, organizations cannot effectively detect, contain, eradicate, and recover from security incidents affecting
  MCP server operations.
risk_explanation: 'MCP servers face unique security risks including prompt injection, tool poisoning, session hijacking, and
  data exfiltration through tool abuse. Without an incident response plan tailored to these risks, organizations respond to
  incidents ad-hoc, leading to delayed containment, incomplete eradication, lost evidence, and prolonged recovery times. The
  autonomous nature of LLM agents means incidents can escalate rapidly, making preparedness critical.

  '
remediation: '1. Develop an incident response plan that addresses MCP-specific security incidents including tool poisoning,
  prompt injection, session compromise, data exfiltration, and agent manipulation.

  2. Define incident severity levels, escalation procedures, communication plans, and recovery procedures.

  3. Include specific playbooks for common MCP attack scenarios.

  4. Conduct regular incident response exercises and update the plan based on lessons learned.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP08:2025
