check_id: gov021
title: Ensure Tool Namespace is configured
category: governance
severity: low
description: Checks for tools that lack organizational namespace prefixes (e.g., "org.read_file" vs just "read_file"). Without
  namespaces, tool name collisions between multiple MCP servers are more likely, reducing governance and traceability.
risk_explanation: 'When tools from multiple MCP servers lack namespace prefixes, name collisions can cause the wrong tool
  to be invoked by an LLM. An attacker can exploit this by registering a malicious MCP server with identically named tools
  that shadow legitimate ones. Without namespaces, there is no way to distinguish between tools from different providers,
  undermining trust and auditability.

  '
remediation: '1. Adopt a consistent namespace convention for all tools using separators such as ".", "/", or "::".

  2. For example, use "myorg.read_file" or "myorg/read_file" instead of just "read_file".

  3. Document the namespace convention and enforce it through code review or automated validation.

  4. Ensure namespaces are unique per server or organization.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP01:2025
tags:
