check_id: gov016
title: Ensure Security Training Program is configured
category: governance
severity: info
description: Checks the MCP server for deployments where developers and operators have not received security training covering
  MCP-specific threats including tool poisoning, prompt injection, SSRF through tools, and session management vulnerabilities.
risk_explanation: 'Developers and operators who are unaware of MCP-specific security risks inadvertently introduce vulnerabilities
  during development and operations. MCP security threats such as tool poisoning, indirect prompt injection, and sampling
  attacks are novel and not covered by traditional security training. Without MCP-specific training, teams cannot design secure
  tools, configure servers defensively, or detect MCP-specific attacks during operations.

  '
remediation: '1. Develop and deliver security training covering MCP-specific threats and defenses.

  2. Include topics such as tool poisoning prevention, prompt injection defense, SSRF mitigation in tools, secure session
  management, and sampling security.

  3. Train developers on secure tool development practices and operators on secure server configuration.

  4. Update training content as the MCP threat landscape evolves.

  5. Track training completion and require annual refresher training.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP08:2025
tags:
