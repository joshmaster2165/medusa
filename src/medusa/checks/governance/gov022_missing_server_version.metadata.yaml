check_id: gov022
title: Missing Server Version
category: governance
severity: low
description: >
  Detects servers that do not declare version information in
  server_info. Without versioning, it is impossible to track security
  patches or known vulnerabilities for deployed server instances.
risk_explanation: >
  Without declared version information, organizations cannot determine
  whether a deployed MCP server includes critical security patches or
  is affected by known vulnerabilities. This makes vulnerability
  management, incident response, and compliance auditing significantly
  harder. Placeholder versions like "0.0.0" or "dev" provide no
  meaningful tracking capability.
remediation: >
  Declare a semantic version (e.g., "1.2.3") in the server's
  server_info response. Use a proper versioning scheme such as semver
  and update the version with each release. Avoid placeholder values
  such as "0.0.0", "dev", or "latest". Automate version injection
  during the build process to ensure accuracy. Document version
  history and associated security fixes.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
owasp_mcp:
  - "MCP07:2025"
tags:
  - governance
  - versioning
  - tracking
