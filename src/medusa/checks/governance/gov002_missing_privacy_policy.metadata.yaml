check_id: gov002
title: Ensure Privacy Policy is configured
category: governance
severity: info
description: Verifies that the MCP server has a privacy policy defining how user data, conversation content, tool inputs,
  and tool outputs are collected, processed, stored, and retained. MCP servers often process sensitive personal information
  through LLM interactions and tool invocations.
risk_explanation: 'MCP servers process potentially sensitive data through tool invocations and LLM interactions, including
  personal information, business data, and conversation contents. Without a privacy policy, there is no defined framework
  for data handling, retention, or user rights. This creates legal and regulatory risk, particularly under GDPR, CCPA, and
  other privacy regulations that require transparent data processing practices.

  '
remediation: '1. Develop a privacy policy that covers all data processed by the MCP server including user inputs, tool parameters,
  tool outputs, conversation history, and session metadata.

  2. Define data retention periods, data subject rights, and data processing lawful bases.

  3. Specify how data is shared with LLM providers and external services accessed by tools.

  4. Make the privacy policy accessible to all users and review it regularly for regulatory compliance.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP08:2025
tags:
