check_id: gov009
title: Ensure Data Governance Framework is configured
category: governance
severity: info
description: Verifies that the MCP server has a data governance framework defining data ownership, classification, handling
  requirements, and lifecycle management for data processed through tool invocations and LLM interactions.
risk_explanation: 'Without data governance, organizations cannot ensure that data processed by MCP servers is handled appropriately.
  Different types of data (PII, financial data, health records, proprietary information) require different handling controls,
  but without classification and governance, all data receives the same minimal treatment. This leads to regulatory violations,
  data breaches, and loss of customer trust when sensitive data is inadequately protected.

  '
remediation: '1. Establish a data governance framework that defines data classification levels, ownership, handling requirements,
  and retention policies for all data processed by the MCP server.

  2. Classify tools by the sensitivity of data they process and apply appropriate controls.

  3. Implement data lineage tracking that records how data flows through tool invocations.

  4. Define data retention and deletion policies.

  5. Appoint data stewards responsible for governance compliance.'
references:
- https://owasp.org/www-project-mcp-top-10/
