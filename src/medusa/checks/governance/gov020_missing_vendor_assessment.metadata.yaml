check_id: gov020
title: Ensure Vendor Security Assessment is configured
category: governance
severity: info
description: Checks the MCP server for deployments that use third-party MCP servers, tools, or LLM providers without conducting
  vendor security assessments. Third-party vendors that process data through MCP integrations must meet security requirements
  commensurate with the sensitivity of the data they handle.
risk_explanation: 'Third-party MCP server vendors and tool providers have direct access to data flowing through tool invocations
  and may store, process, or transmit this data in ways the organization cannot control. Without vendor security assessments,
  organizations trust vendors with sensitive data based on marketing claims rather than verified security practices. A vendor
  security breach can expose all data processed through their MCP servers or tools, and the organization bears the regulatory
  and reputational consequences.

  '
remediation: '1. Conduct security assessments for all third-party MCP server vendors, tool providers, and LLM service providers.

  2. Request SOC 2 Type II reports, penetration test summaries, and security certifications.

  3. Evaluate vendors against your organization''s security requirements.

  4. Include security requirements in vendor contracts and service agreements.

  5. Conduct annual vendor security reviews and require breach notification commitments.

  6. Maintain a vendor risk register that tracks assessment status and findings.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP08:2025
