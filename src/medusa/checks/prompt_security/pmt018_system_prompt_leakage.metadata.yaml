check_id: pmt018
title: System Prompt Leakage
category: prompt_security
severity: high
description: >
  Detects prompts whose descriptions expose internal system instructions
  or configuration. Phrases like "system prompt", "you are a",
  "internal instructions", or "do not reveal" in user-visible metadata
  suggest that confidential system-level instructions have been leaked
  into the prompt interface.
risk_explanation: >
  System prompt content typically contains behavioral instructions,
  access boundaries, and operational constraints for the LLM. When
  these instructions leak into user-visible prompt descriptions, an
  attacker can understand the system boundaries and craft targeted
  jailbreak or bypass attacks. Leaked instructions may also reveal
  internal architecture, API endpoints, or security controls.
remediation: >
  Move all system instructions to server-side prompt construction that
  is not exposed through MCP metadata. Keep prompt descriptions limited
  to user-facing functionality summaries. Implement a review process
  that checks prompt descriptions for system instruction content before
  deployment. Use separate channels for system instructions versus
  user-facing prompt documentation.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/prompts"
owasp_mcp:
  - "MCP05:2025"
tags:
  - prompt_security
  - information_disclosure
  - system_prompt
