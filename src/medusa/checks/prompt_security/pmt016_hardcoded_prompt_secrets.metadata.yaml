check_id: pmt016
title: Hardcoded Secrets in Prompt Templates
category: prompt_security
severity: critical
description: >
  Detects API keys, tokens, passwords, and other credentials hardcoded
  in prompt descriptions and metadata. Prompt metadata is visible to
  MCP clients and LLMs, making embedded secrets a direct credential
  exposure vector. Common patterns include OpenAI keys (sk-), AWS
  access keys (AKIA), GitHub PATs (ghp_), and Slack tokens (xoxb-).
risk_explanation: >
  Hardcoded secrets in prompt templates are exposed to every client
  that lists or inspects prompts. An attacker connecting a malicious
  client can harvest these credentials to access external APIs, cloud
  services, or internal systems. Secrets embedded in prompts may also
  be sent to LLMs as context, risking leakage through model outputs
  or logging pipelines.
remediation: >
  Remove all hardcoded secrets from prompt descriptions and templates.
  Use environment variables or a secrets manager to store credentials.
  Reference secrets by name rather than value in prompt metadata.
  Implement a pre-commit hook or CI check that scans prompt definitions
  for secret patterns before deployment.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/prompts"
owasp_mcp:
  - "MCP05:2025"
tags:
  - prompt_security
  - secrets
  - credential_exposure
