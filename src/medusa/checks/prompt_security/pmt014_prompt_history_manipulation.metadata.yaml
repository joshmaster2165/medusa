check_id: pmt014
title: Ensure protection against Prompt History manipulation
category: prompt_security
severity: high
description: Checks for MCP prompt definitions that can be used to manipulate or forge conversation history, inject fake previous
  messages, or alter the perceived context of the conversation. History manipulation enables social engineering of the LLM
  through fabricated context.
risk_explanation: 'Prompt history manipulation allows an attacker to create a false conversation context that tricks the LLM
  into believing prior agreements, authorizations, or instructions were established. This enables bypassing confirmation requirements
  by fabricating prior consent, establishing false trust through fake conversation history, and overriding safety constraints
  by presenting fabricated context where constraints were already relaxed.

  '
remediation: '1. Implement conversation history integrity verification that prevents injection of fabricated messages.

  2. Use signed or hashed message histories that detect tampering.

  3. Separate server-injected prompt content from actual conversation history.

  4. Validate that prompt definitions cannot forge message roles or inject into the conversation history context.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP06:2025
- MCP10:2025
tags:
- prompt_security
- injection
