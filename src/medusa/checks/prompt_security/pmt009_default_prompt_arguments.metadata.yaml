check_id: pmt009
title: Ensure default prompt arguments are safe
category: prompt_security
severity: high
description: Checks for MCP prompt definitions with default argument values that contain sensitive information, overly permissive
  instructions, or dangerous operational parameters. Default values are used when clients do not explicitly provide arguments,
  making them implicit and easy to overlook during security review.
risk_explanation: 'Dangerous default arguments create hidden risks because they apply automatically when not overridden. Default
  values containing elevated permissions, broad access scopes, or sensitive configuration create security exposures that users
  are unaware of. Attackers who discover dangerous defaults can exploit them by simply omitting arguments rather than injecting
  values, bypassing input validation entirely.

  '
remediation: '1. Review all prompt argument defaults for security implications.

  2. Apply the principle of least privilege to default values, using the most restrictive safe defaults.

  3. Avoid embedding sensitive information, credentials, or broad access scopes in default values.

  4. Document all default values and their security implications.

  5. Require explicit argument values for security-sensitive parameters.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
