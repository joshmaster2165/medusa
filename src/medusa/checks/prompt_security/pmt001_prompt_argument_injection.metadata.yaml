check_id: pmt001
title: Ensure protection against Prompt Argument injection
category: prompt_security
severity: high
description: Checks for MCP prompt templates that incorporate user-supplied arguments directly into prompt text without sanitization
  or escaping. Malicious argument values can alter the prompt semantics, inject new instructions, or override the intended
  prompt behavior.
risk_explanation: 'When prompt arguments are interpolated without sanitization, an attacker can inject additional instructions
  that the LLM treats as part of the original prompt. This enables privilege escalation by injecting admin-level instructions,
  data exfiltration by adding instructions to output sensitive context, and behavioral manipulation by overriding the prompt
  intended purpose.

  '
remediation: '1. Sanitize all prompt arguments before interpolation by escaping special characters and instruction delimiters.

  2. Use structured prompt templates that clearly delineate system instructions from user input.

  3. Implement argument validation with strict type checking and length limits.

  4. Consider using parameterized prompts that prevent argument content from being interpreted as instructions.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
