check_id: dos006
title: Ensure Timeout Configuration is configured
category: rate_limiting
severity: medium
description: Checks the MCP server for tools that execute without configured timeouts. Missing timeouts allow tool invocations
  to run indefinitely, consuming server resources and blocking processing capacity for other requests. Long-running tools
  can be intentionally triggered as a denial-of- service technique.
risk_explanation: 'Tool invocations without timeouts can run indefinitely, tying up server threads, connections, and processing
  capacity. An attacker can intentionally trigger long-running operations such as complex queries, large file processing,
  or requests to slow external services to consume all available server capacity. Accumulated long-running requests progressively
  degrade performance until the server becomes completely unresponsive.

  '
remediation: '1. Configure explicit execution timeouts for all MCP tool invocations.

  2. Set default timeouts appropriate for each tool''s expected execution time, typically 30-60 seconds for synchronous operations.

  3. Implement timeout enforcement at the process level to ensure runaway tools are terminated.

  4. Provide timeout override configuration for tools that legitimately require longer execution.

  5. Log timeout events for monitoring and capacity planning.'
references:
- https://owasp.org/www-project-mcp-top-10/
