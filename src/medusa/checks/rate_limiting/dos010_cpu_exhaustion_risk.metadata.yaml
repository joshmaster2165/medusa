check_id: dos010
title: Ensure protection against CPU Exhaustion
category: rate_limiting
severity: info
description: Checks the MCP server for tools that can cause excessive CPU usage through computationally intensive operations
  such as complex regex evaluation, cryptographic operations, data transformation, or algorithmic processing without CPU time
  limits.
risk_explanation: 'CPU-intensive MCP tool invocations degrade performance for all sessions sharing the server. An attacker
  can trigger worst-case computational complexity through crafted inputs such as regex patterns causing catastrophic backtracking,
  deeply nested JSON structures, or large matrix operations. Unlike memory exhaustion which is immediately fatal, CPU exhaustion
  causes progressive degradation, making detection more difficult while still rendering the server effectively unusable for
  all clients.

  '
remediation: '1. Implement CPU time limits for individual tool invocations using process-level resource controls.

  2. Use algorithms with predictable complexity and avoid operations vulnerable to algorithmic complexity attacks.

  3. Implement input validation that rejects inputs likely to trigger worst-case performance.

  4. Deploy CPU usage monitoring and alerting.

  5. Use process priority or cgroup controls to ensure tool invocations cannot starve the core server process.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
