check_id: dos005
title: Ensure Payload Size Limit is configured
category: rate_limiting
severity: info
description: Checks the MCP server for configurations that do not enforce size limits on request and response payloads. Without
  size limits, attackers can send oversized requests that consume memory during parsing or trigger tools to generate massive
  responses that exhaust server resources.
risk_explanation: 'Missing payload size limits expose MCP servers to memory exhaustion attacks. An attacker can send tool
  invocation requests with extremely large parameters that consume excessive memory during parsing and processing. Conversely,
  tool invocations can be crafted to generate oversized responses that exhaust server memory during serialization. Large payloads
  also consume network bandwidth and can degrade performance for all connected clients.

  '
remediation: '1. Enforce maximum payload size limits for all MCP requests and responses.

  2. Set request body size limits at the transport layer (web server or reverse proxy) to prevent oversized requests from
  reaching the application.

  3. Implement per-parameter size limits for tool invocation arguments.

  4. Set maximum response sizes for tool outputs.

  5. Implement streaming for large responses rather than buffering entire payloads in memory.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
