check_id: dos003
title: Ensure protection against Resource Exhaustion
category: rate_limiting
severity: info
description: Checks the MCP server for tools that can consume unbounded system resources during execution. Tools that process
  large inputs, perform complex computations, or interact with external services without resource limits can exhaust server
  capacity and affect all connected sessions.
risk_explanation: 'MCP tools without resource boundaries can consume unlimited CPU, memory, network bandwidth, or disk I/O
  during a single invocation. An attacker can craft tool inputs that trigger worst-case resource consumption, such as regex
  patterns causing catastrophic backtracking, queries returning massive result sets, or computations with exponential complexity.
  A single resource- exhausting tool invocation can render the entire MCP server unresponsive.

  '
remediation: '1. Implement resource limits for each tool invocation including CPU time, memory allocation, output size, and
  execution duration.

  2. Use process isolation, containers, or sandboxes to enforce resource limits at the operating system level.

  3. Set timeouts for all tool executions that terminate runaway processes.

  4. Monitor resource consumption per tool invocation and alert on anomalous usage.

  5. Implement input size validation to prevent resource-intensive processing.'
references:
- https://owasp.org/www-project-mcp-top-10/
