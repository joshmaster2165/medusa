check_id: dos011
title: Ensure Recursive Operation Limit is configured
category: rate_limiting
severity: info
description: Checks the MCP server for tools that perform recursive operations without depth limits. Unbounded recursion in
  file traversal, data processing, dependency resolution, or nested structure parsing can exhaust stack space and cause server
  crashes.
risk_explanation: 'Recursive operations without depth limits can exhaust server stack space, causing crashes, or consume exponential
  CPU and memory resources, causing denial of service. An attacker can craft inputs such as deeply nested JSON, circular directory
  structures, or self- referencing data that trigger unbounded recursion in MCP tools. Stack overflow crashes are particularly
  dangerous because they terminate the entire server process without graceful degradation.

  '
remediation: '1. Implement explicit recursion depth limits for all recursive operations in MCP tools.

  2. Set maximum depths for file traversal, nested structure parsing, dependency resolution, and data processing recursion.

  3. Use iterative algorithms instead of recursive ones where possible.

  4. Implement cycle detection for operations on graph-structured data.

  5. Monitor recursion depths and alert on unexpectedly deep operations.'
references:
- https://owasp.org/www-project-mcp-top-10/
