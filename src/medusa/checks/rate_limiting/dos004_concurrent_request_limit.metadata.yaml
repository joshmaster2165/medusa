check_id: dos004
title: Ensure Concurrent Request Limit is configured
category: rate_limiting
severity: medium
description: Checks the MCP server for configurations that allow unlimited concurrent requests from a single client or across
  all clients. Without concurrent request limits, server threads, connections, and processing capacity can be exhausted by
  parallel requests from aggressive LLM agents.
risk_explanation: 'Unlimited concurrent requests allow a single LLM agent to consume all available server processing capacity.
  Modern LLM agents often issue multiple tool invocations in parallel, and without concurrency limits, a single session can
  monopolize server resources. An attacker can amplify this by opening multiple sessions, each generating parallel requests,
  creating a distributed denial-of-service condition from a single client.

  '
remediation: '1. Implement concurrent request limits per client session and globally across the MCP server.

  2. Set a maximum number of in-flight requests per session based on expected agent behavior, typically 3-10 concurrent requests.

  3. Queue excess requests rather than rejecting them immediately.

  4. Monitor concurrent request counts and alert when limits are consistently reached.

  5. Implement fair scheduling that prevents any single session from monopolizing server capacity.'
references:
- https://owasp.org/www-project-mcp-top-10/
