check_id: dos007
title: Ensure protection against Connection Pool exhaustion
category: rate_limiting
severity: info
description: Checks the MCP server for configurations where connection pools for databases, external APIs, or internal services
  can be exhausted by excessive tool invocations. Without connection pool management, tools that open connections without
  proper release can deplete available connections.
risk_explanation: 'Connection pool exhaustion blocks all MCP tool invocations that require external connectivity. When tools
  consume all available connections to databases, APIs, or caches, new tool invocations fail or hang waiting for connections.
  An attacker can trigger this by invoking tools that hold connections open through slow requests, error conditions, or intentional
  delays. This creates a denial of service that affects all users and all tools that share the connection pool.

  '
remediation: '1. Configure connection pool limits with appropriate maximum sizes for each external service.

  2. Implement connection timeouts that release connections held longer than expected.

  3. Use connection pool monitoring to detect exhaustion before it impacts service.

  4. Implement per-session connection quotas that prevent any single session from consuming all connections.

  5. Use circuit breaker patterns that fail fast when connection pools are near exhaustion.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
