check_id: sc015
title: Ensure remote fetch tools restrict accessible domains
category: supply_chain
severity: high
description: >-
  Checks whether tools that fetch remote content via HTTP/URLs include
  allowlist or blocklist parameters to restrict which domains can be accessed.
  Without domain restrictions, these tools enable unrestricted SSRF attacks.
risk_explanation: >-
  Tools that fetch remote resources without domain restrictions can be abused
  for Server-Side Request Forgery (SSRF). An attacker can direct the tool to
  access internal services, cloud metadata endpoints, or other sensitive
  resources that should not be externally accessible. This can lead to
  credential theft, internal service enumeration, and data exfiltration.
remediation: >-
  1. Add allowlist/blocklist parameters to restrict accessible domains.
  2. Implement server-side URL validation with domain allowlists.
  3. Block access to private IP ranges and cloud metadata endpoints.
  4. Use a network proxy with URL filtering for outbound requests.
  5. Log and monitor all external fetch operations.
references:
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP07:2025
tags:
  - supply_chain
  - ssrf
  - remote_fetch
  - domain_restriction
