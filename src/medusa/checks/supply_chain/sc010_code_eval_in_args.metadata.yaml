check_id: sc010
title: Code Evaluation in Server Args
category: supply_chain
severity: critical
description: >
  Detects server arguments that contain eval(), exec(), __import__(),
  compile(), Function(), setTimeout(), setInterval(), child_process,
  subprocess, or os.system(). These dynamic code execution constructs
  allow arbitrary code execution during MCP server startup.
risk_explanation: >
  Dynamic code execution in server launch arguments enables arbitrary
  code to run with the MCP server's privileges. An attacker who can
  influence the server configuration (e.g. through a malicious config
  file or environment variable injection) can inject eval() or exec()
  calls to execute malicious payloads. This bypasses all static analysis
  and code review since the code is generated at runtime.
remediation: >
  Remove all dynamic code execution constructs from server arguments.
  Use static configuration files or environment variables instead of
  inline code evaluation. If code execution is required during startup,
  use a dedicated bootstrap script that can be audited and version-
  controlled. Implement argument allowlisting to prevent injection of
  code execution patterns.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
owasp_mcp:
  - "MCP09:2025"
tags:
  - supply_chain
  - code_execution
  - eval
  - exec
  - injection
