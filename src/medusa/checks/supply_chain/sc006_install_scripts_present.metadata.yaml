check_id: sc006
title: Ensure install scripts are reviewed for safety
category: supply_chain
severity: high
description: Checks the MCP server for dependencies that include install scripts (preinstall, postinstall, or equivalent lifecycle
  hooks). Install scripts execute arbitrary code during package installation.
risk_explanation: 'Package install scripts execute arbitrary code with the privileges of the installing user during the npm
  install, pip install, or equivalent process. A compromised package with a malicious install script achieves code execution
  before the application even starts. Install scripts run outside the application''s security sandbox and can access the full
  filesystem, network, and environment.

  '
remediation: '1. Audit all packages with install scripts and verify their necessity.

  2. Use the --ignore-scripts flag during installation and run required scripts explicitly after review.

  3. Configure package managers to block install scripts by default.

  4. Use tools that detect and flag packages with install scripts during dependency review.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP04:2025
tags:
- supply_chain
