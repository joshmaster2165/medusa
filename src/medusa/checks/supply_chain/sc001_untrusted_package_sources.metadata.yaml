check_id: sc001
title: Ensure Package Sources are trusted and verified
category: supply_chain
severity: high
description: Checks the MCP server for configurations that install packages from untrusted or non-standard sources. This includes
  custom npm registries, pip installs from arbitrary URLs, and npm installs from git URLs without commit hash pinning.
risk_explanation: 'Installing packages from untrusted registries, raw URLs, or unpinned git repositories exposes the host
  to supply-chain attacks. An attacker controlling the source can inject malicious code that executes with the privileges
  of the MCP server process. Without commit hash pinning on git URLs, even a trusted repository can be compromised through
  branch manipulation.

  '
remediation: '1. Only install packages from official registries (registry.npmjs.org, pypi.org).

  2. When using git URLs, always pin to a specific commit hash.

  3. Avoid installing packages directly from HTTP/HTTPS URLs.

  4. Use lockfiles and hash verification to ensure package integrity.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP04:2025
tags:
