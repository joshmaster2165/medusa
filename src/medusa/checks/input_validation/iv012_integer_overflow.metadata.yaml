check_id: iv012
title: Ensure protection against integer overflow
category: input_validation
severity: medium
description: Checks for numeric tool parameters without explicit range constraints (minimum/maximum values). Unconstrained
  integer parameters can trigger integer overflow, underflow, or truncation vulnerabilities in server- side processing.
risk_explanation: 'Integer overflow can cause unexpected behaviour including buffer overflows, incorrect calculations, and
  security check bypasses. A parameter that overflows from a large positive to a negative value can bypass range checks, cause
  incorrect memory allocation sizes, or lead to array index out-of-bounds access.

  '
remediation: '1. Define explicit minimum and maximum constraints for all numeric parameters using JSON Schema''s minimum and
  maximum keywords.

  2. Use exclusiveMinimum and exclusiveMaximum where appropriate.

  3. Implement server-side range validation independent of schema constraints.

  4. Use language-safe integer types that detect overflow.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
