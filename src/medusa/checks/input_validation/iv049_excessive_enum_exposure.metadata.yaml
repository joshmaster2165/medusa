check_id: iv049
title: Ensure tool parameters do not expose excessive enum values
category: input_validation
severity: low
description: >-
  Checks whether tool input schema parameters contain an unusually large number
  of enum values (more than 50). Excessive enum lists may indicate that internal
  data such as user identifiers, database record keys, or system configuration
  values are being exposed through the tool schema itself.
risk_explanation: >-
  Enum values in a JSON Schema are exposed to any client that discovers the tool.
  When a parameter lists hundreds of enum values, the list itself becomes a data
  leak vector. Attackers can harvest user IDs, account names, internal project
  codes, or configuration keys directly from the schema without ever invoking the
  tool. This information can then be used for targeted attacks, account enumeration,
  or privilege escalation.
remediation: >-
  1. Replace large enum lists with server-side validation that checks the value
  against an internal allowlist without exposing it in the schema.

  2. Use a pattern constraint or format validation instead of enumerating all
  valid values.

  3. If enum values must be exposed, limit the list to a reasonable size and
  use pagination or a separate lookup tool for large datasets.

  4. Review enum contents for sensitive data before publishing tool schemas.
references:
  - https://owasp.org/www-project-mcp-top-10/
  - https://cwe.mitre.org/data/definitions/200.html
  - https://json-schema.org/understanding-json-schema/reference/enum
owasp_mcp:
  - MCP06:2025
tags:
  - input_validation
  - enum
  - data_leak
  - information_exposure
