check_id: iv013
title: Ensure protection against Format String injection
category: input_validation
severity: high
description: Checks for tool parameters used in string formatting operations without sanitization. Parameters passed to printf-style,
  f-string, or template string formatters can inject format specifiers that read memory, cause crashes, or write to arbitrary
  memory locations.
risk_explanation: 'Format string vulnerabilities allow an attacker to read from and write to arbitrary memory addresses using
  format specifiers like %x, %n, and %s. In higher-level languages, format string injection can leak internal state, cause
  exceptions, or enable further injection attacks through formatted output.

  '
remediation: '1. Never pass user input as the format string argument.

  2. Use parameterized formatting where user input is always a format argument, not the format template.

  3. Validate parameters to reject strings containing format specifiers (%, {, }).

  4. Use structured logging that separates templates from parameters.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP05:2025
tags:
