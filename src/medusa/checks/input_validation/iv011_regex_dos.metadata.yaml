check_id: iv011
title: Ensure protection against regular expression DoS (ReDoS)
category: input_validation
severity: medium
description: Checks for tool parameters used in regular expression matching without complexity limits. User-controlled input
  in regex patterns or matched against vulnerable regex patterns can cause catastrophic backtracking, leading to denial of
  service.
risk_explanation: 'ReDoS attacks exploit regular expressions with exponential backtracking behaviour. A crafted input string
  can cause the regex engine to consume 100% CPU for minutes or hours, effectively denying service. Common vulnerable patterns
  include nested quantifiers like (a+)+ and overlapping alternations.

  '
remediation: '1. Never use user-supplied input directly as regex patterns.

  2. Set execution time limits on regex matching operations.

  3. Use regex engines with linear-time guarantees (RE2, rust-regex).

  4. Review all regex patterns for catastrophic backtracking using tools like rxxr2 or safe- regex.

  5. Implement input length limits for strings matched against regex.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP05:2025
tags:
