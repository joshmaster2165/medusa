check_id: iv021
title: Ensure protection against Environment Variable injection
category: input_validation
severity: high
description: Checks for tool parameters used to set or modify environment variables. Parameters that can influence the process
  environment allow attackers to override PATH, LD_PRELOAD, and other security-critical variables.
risk_explanation: 'Environment variable injection can override security-critical settings. Setting PATH allows command hijacking,
  LD_PRELOAD enables shared library injection, and variables like NODE_OPTIONS or PYTHONPATH can force execution of attacker-controlled
  code. Environment changes persist for the process lifetime and affect all subsequent operations.

  '
remediation: '1. Never allow user-supplied parameters to directly set environment variables.

  2. Use an allowlist of permitted environment variable names.

  3. Validate values against strict patterns.

  4. Implement environment isolation for tool execution contexts.

  5. Reject parameters containing known dangerous variable names (PATH, LD_PRELOAD, HOME).'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
