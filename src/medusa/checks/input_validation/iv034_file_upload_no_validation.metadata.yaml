check_id: iv034
title: Ensure Validation is configured for File Upload
category: input_validation
severity: high
description: Checks for file upload tool parameters without type, size, or content validation constraints. Unrestricted file
  uploads allow attackers to submit malicious executables, oversized files for denial of service, or files with double extensions
  to bypass type restrictions.
risk_explanation: 'Unrestricted file uploads can deliver malware, web shells, and exploitable content to the server. An attacker
  can upload a PHP/Python web shell disguised as an image, overwrite critical files through path manipulation, or exhaust
  disk space with oversized uploads. File uploads are a primary vector for remote code execution.

  '
remediation: '1. Validate file type using content-based detection (magic bytes), not just file extension.

  2. Set maximum file size limits in the schema and at the transport layer.

  3. Restrict allowed MIME types to an explicit allowlist.

  4. Store uploads outside the web root with randomized names.

  5. Scan uploaded files for malware before processing.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html
owasp_mcp:
- MCP05:2025
tags:
