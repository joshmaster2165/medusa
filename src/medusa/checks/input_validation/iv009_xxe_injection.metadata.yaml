check_id: iv009
title: Ensure protection against XML External Entity Injection
category: input_validation
severity: high
description: Checks for tool parameters that accept XML input without restrictions on external entity processing. XXE attacks
  exploit XML parsers that resolve external entities, enabling file disclosure, SSRF, and denial of service.
risk_explanation: 'XXE injection allows an attacker to read local files on the server by defining external entities that reference
  file:// URIs. It can also trigger server-side requests to internal services (SSRF) or cause denial of service through recursive
  entity expansion (billion laughs attack). XXE is dangerous because many XML parsers enable external entities by default.

  '
remediation: '1. Disable external entity processing in all XML parsers.

  2. Set XMLConstants.FEATURE_SECURE_PROCESSING and disable DTDs.

  3. Use JSON instead of XML where possible.

  4. If XML is required, use a parser configured to reject external entities and DTD processing.

  5. Add schema validation for XML parameters.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
owasp_mcp:
- MCP05:2025
tags:
