check_id: iv038
title: Ensure protection against HTTP header injection (CRLF)
category: input_validation
severity: high
description: Checks for tool parameters with HTTP header-related names that lack CRLF protection. Without rejecting carriage
  return and line feed characters, attackers can inject additional HTTP headers, enabling response splitting, session fixation,
  and cache poisoning attacks.
risk_explanation: 'HTTP header injection via CRLF sequences allows attackers to insert arbitrary headers into HTTP responses.
  This enables response splitting attacks where the attacker controls an entire second HTTP response, session fixation via
  injected Set-Cookie headers, cache poisoning, and cross-site scripting through injected Content-Type headers. Header injection
  is a gateway to many downstream attacks.

  '
remediation: '1. Add pattern constraints to header parameters that reject carriage return (\\r) and line feed (\\n) characters.

  2. Use a whitelist pattern such as "^[\\x20-\\x7E]+$" to allow only printable ASCII without control characters.

  3. Validate and sanitize header values server-side before including them in HTTP responses.

  4. Use enum constraints for headers with known valid values.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://owasp.org/www-community/attacks/HTTP_Response_Splitting
- https://modelcontextprotocol.io/specification/2025-03-26/server/tools
