check_id: iv035
title: Ensure protection against HTML Injection
category: input_validation
severity: medium
description: Checks for tool parameters whose output may be rendered in HTML contexts without proper escaping. Parameters
  containing HTML tags or entities can inject content into web pages, enabling cross-site scripting and content spoofing attacks.
risk_explanation: 'HTML injection allows attackers to modify the visual presentation of web pages, inject phishing forms,
  or escalate to cross-site scripting (XSS) by injecting script tags. Even without script execution, HTML injection can create
  fake login forms, misleading content, or UI redress attacks that trick users into unintended actions.

  '
remediation: '1. Escape all user-controlled parameters before rendering in HTML contexts.

  2. Use context-appropriate encoding (HTML entity encoding for content, attribute encoding for attributes, URL encoding for
  URLs).

  3. Implement Content Security Policy headers to mitigate XSS.

  4. Use template engines with automatic escaping enabled by default.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
owasp_mcp:
