check_id: iv043
title: Unbounded Numeric Range
category: input_validation
severity: low
description: >
  Detects numeric parameters (integer or number) that lack both
  minimum and maximum constraints. Without bounded ranges, attackers
  can pass extreme values causing integer overflow, resource
  exhaustion, excessive memory allocation, or unexpected application
  behavior.
risk_explanation: >
  Unbounded numeric parameters allow attackers to submit arbitrarily
  large or small values. Extremely large integers can cause integer
  overflow leading to security bypasses. Negative values where only
  positive ones are expected can invert business logic. Large numbers
  used as array sizes, loop counts, or memory allocations can exhaust
  server resources and cause denial of service. Even without overflow,
  unexpected numeric ranges can trigger edge cases in downstream
  processing logic.
remediation: >
  Add both minimum and maximum constraints to all numeric parameters
  in the JSON Schema. Define sensible bounds based on the parameter's
  business purpose. For example, page sizes should have a maximum
  (e.g., 100), quantities should be non-negative, and IDs should have
  realistic upper bounds. Use JSON Schema "minimum", "maximum",
  "exclusiveMinimum", and "exclusiveMaximum" keywords.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/tools"
owasp_mcp:
  - "MCP04:2025"
tags:
  - input_validation
  - numeric_range
  - integer_overflow
  - resource_exhaustion
