check_id: iv042
title: Ensure protection against XML external entity (XXE) injection
category: input_validation
severity: high
description: Checks for tool parameters that accept XML content without validation constraints. Unvalidated XML input allows
  attackers to inject external entity declarations that read local files, perform server-side request forgery, or cause denial
  of service through recursive entity expansion (billion laughs attack).
risk_explanation: 'XML External Entity injection exploits XML parsers that process external entity references. Attackers can
  craft XML payloads that read sensitive files from the server filesystem (/etc/passwd, configuration files), initiate outbound
  network requests to internal services (SSRF), or cause denial of service through recursive entity expansion. Even if the
  XML parser is configured securely, accepting raw XML input without schema validation expands the attack surface significantly.

  '
remediation: '1. Add pattern constraints to XML parameters to reject DOCTYPE declarations and external entity references.

  2. Use JSON Schema patterns that disallow "<!DOCTYPE", "<!ENTITY", and "SYSTEM" keywords in XML input.

  3. Configure server-side XML parsers to disable external entity processing and DTD loading.

  4. Consider accepting structured JSON parameters instead of raw XML where possible.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/07-Testing_for_XML_Injection
- https://modelcontextprotocol.io/specification/2025-03-26/server/tools
