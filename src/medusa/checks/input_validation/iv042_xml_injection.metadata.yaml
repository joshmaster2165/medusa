check_id: iv042
title: Ensure protection against XML external entity injection (XXE)
category: input_validation
severity: high
description: Checks for tool parameters with XML-related names that lack input validation constraints. Unvalidated XML parameters
  allow attackers to inject XXE payloads like <!DOCTYPE> and <!ENTITY> to read local files, perform server-side request forgery,
  or cause denial of service via entity expansion (billion laughs attack).
risk_explanation: 'XML External Entity (XXE) injection enables attackers to define external entities in XML documents that
  reference local files, internal network resources, or recursive entity definitions. This can lead to sensitive file disclosure
  (/etc/passwd, application configs), SSRF attacks against internal services, denial of service through entity expansion bombs,
  and in some cases remote code execution. MCP tools accepting raw XML input without validation are prime targets for XXE
  attacks.

  '
remediation: '1. Add strict pattern constraints to XML parameters using JSON Schema regex patterns that reject DOCTYPE and
  ENTITY declarations.

  2. Use enum constraints where possible.

  3. Configure XML parsers to disable external entity processing and DTD loading.

  4. Use defusedxml or equivalent safe XML parsing libraries.

  5. Consider accepting structured JSON instead of raw XML input.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://owasp.org/www-community/vulnerabilities/XML_External_Entity_(XXE)_Processing
- https://modelcontextprotocol.io/specification/2025-03-26/server/tools
