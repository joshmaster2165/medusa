check_id: iv016
title: Ensure protection against Unicode Normalization bypass
category: input_validation
severity: medium
description: Checks for input validation that can be bypassed via Unicode normalization transformations. Characters that appear
  different in their composed and decomposed forms can bypass security filters while being normalized to dangerous values
  by the processing system.
risk_explanation: 'Unicode normalization can transform filtered characters into dangerous equivalents after validation. For
  example, the fullwidth solidus (U+FF0F) normalizes to a regular slash (/), bypassing path traversal filters. The validation
  check passes the pre-normalized form while the application processes the post-normalized dangerous form.

  '
remediation: '1. Apply Unicode normalization (NFC or NFKC) to all input before validation, not after.

  2. Validate against the normalized form to ensure filters see the same representation as the processing logic.

  3. Reject input containing non-ASCII characters when only ASCII is expected.

  4. Use Unicode-aware validation libraries.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP05:2025
tags:
- input_validation
- unicode_normalization
