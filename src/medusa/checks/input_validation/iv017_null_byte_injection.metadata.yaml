check_id: iv017
title: Ensure protection against Null Byte Injection
category: input_validation
severity: high
description: Checks for tool parameters that may be vulnerable to null byte injection. Null bytes (\\x00) in file paths or
  strings can truncate processing in C-based libraries, causing the application to operate on a different resource than validated.
risk_explanation: 'Null byte injection exploits the difference between how high-level languages (Python, Java) and C-level
  libraries handle null characters. A path like ''safe.txt\\x00.jpg'' passes a .jpg extension check but is truncated to ''safe.txt''
  by the filesystem. This bypasses extension validation, path restrictions, and type checking.

  '
remediation: '1. Reject all input containing null bytes (\\x00).

  2. Strip null bytes from parameters before processing.

  3. Implement validation that explicitly checks for null byte presence.

  4. Use language-native path handling functions that are not vulnerable to null byte truncation.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP05:2025
tags:
