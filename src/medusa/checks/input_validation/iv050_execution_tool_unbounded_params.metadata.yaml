check_id: iv050
title: Ensure execution tool parameters have input constraints
category: input_validation
severity: critical
description: >-
  Checks every string parameter on tools whose name suggests execution
  (command, exec, run, shell, query, eval, execute, script, bash, terminal,
  invoke, call_tool) for the absence of ANY constraint — no pattern, enum,
  maxLength, or format.  Unlike IV-001 which only inspects parameters named
  after shell concepts, this check catches innocuously-named parameters on
  execution tools that still accept unconstrained input and could be used to
  inject arbitrary commands or code.
risk_explanation: >-
  Execution-oriented tools are high-value targets for prompt-injection and
  tool-abuse attacks.  Even parameters that are not named "command" or "exec"
  may be concatenated into a shell invocation, SQL query, or code-eval call
  on the server side.  Without any schema-level constraint the attack surface
  is unlimited: an attacker-controlled value can inject arbitrary payloads,
  exfiltrate data, or achieve remote code execution.
remediation: >-
  1. Add a strict pattern regex, enum allowlist, maxLength cap, or format
  annotation to every string parameter on execution-oriented tools.
  2. Prefer structured arguments over free-form strings wherever possible.
  3. Implement server-side input validation and sandboxing as a
  defense-in-depth measure independent of the JSON Schema constraints.
  4. Audit all tools whose names contain execution keywords and ensure every
  parameter is tightly scoped.
references:
  - https://owasp.org/www-project-mcp-top-10/
  - https://modelcontextprotocol.io/specification/2025-03-26/server/tools
  - https://cheatsheetseries.owasp.org/cheatsheets/OS_Command_Injection_Defense_Cheat_Sheet.html
owasp_mcp:
  - MCP01:2025
tags:
  - input_validation
  - execution
  - unbounded_params
  - rce
