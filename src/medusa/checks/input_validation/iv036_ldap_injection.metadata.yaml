check_id: iv036
title: LDAP Injection Parameters
category: input_validation
severity: high
description: >
  Detects tool parameters with LDAP-related names that lack input
  validation constraints. Unvalidated LDAP parameters allow attackers
  to inject malicious LDAP filter expressions, modify directory queries,
  and exfiltrate or manipulate directory service data.
risk_explanation: >
  LDAP injection enables attackers to alter the logic of LDAP queries
  by inserting special characters such as parentheses, asterisks, and
  logical operators. This can bypass authentication, enumerate users
  and groups, escalate privileges, and extract sensitive directory
  information including passwords and organizational data.
remediation: >
  Add strict pattern constraints to LDAP parameters using JSON Schema
  regex patterns that whitelist only safe characters. Use enum
  constraints for parameters with known valid values. Escape all
  LDAP special characters (*, (, ), \, NUL) server-side before
  constructing LDAP queries. Use parameterized LDAP queries where
  supported by the directory SDK.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://cheatsheetseries.owasp.org/cheatsheets/LDAP_Injection_Prevention_Cheat_Sheet.html"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/tools"
owasp_mcp:
  - "MCP04:2025"
tags:
  - input_validation
  - ldap_injection
  - directory_services
