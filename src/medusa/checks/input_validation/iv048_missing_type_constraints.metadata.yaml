check_id: iv048
title: Ensure string parameters have type constraints
category: input_validation
severity: medium
description: >-
  Checks whether string parameters in tool schemas have at least one validation
  constraint such as maxLength, pattern, enum, or format. Unconstrained string
  parameters accept arbitrary input of unlimited length, creating injection
  attack vectors.
risk_explanation: >-
  String parameters without constraints accept any input of any length. This
  creates multiple attack vectors including command injection, SQL injection,
  path traversal, and prompt injection. Even a simple maxLength constraint
  significantly reduces the attack surface by limiting payload size. JSON
  Schema provides several constraint mechanisms (maxLength, pattern, enum,
  format) that should be used to validate input.
remediation: >-
  1. Add maxLength to all string parameters to limit input size.
  2. Use pattern constraints with regex to restrict allowed characters.
  3. Use enum for parameters with a known set of valid values.
  4. Use format for standard types (date, email, uri, etc.).
  5. Combine multiple constraints for defense in depth.
references:
  - https://owasp.org/www-project-mcp-top-10/
  - https://json-schema.org/understanding-json-schema/reference/string
owasp_mcp:
  - MCP04:2025
tags:
  - input_validation
  - schema_constraints
  - injection_prevention
