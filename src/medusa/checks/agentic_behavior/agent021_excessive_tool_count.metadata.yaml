check_id: agent021
title: Ensure Tool Count is bounded
category: agentic_behavior
severity: medium
description: Checks for servers exposing an excessive number of tools (more than 50). Large tool counts increase the attack
  surface, make security review harder, and may overwhelm LLM context windows with tool definitions, reducing the quality
  of tool selection decisions.
risk_explanation: 'Servers with a large number of tools present a wider attack surface for tool poisoning and confusion attacks.
  LLM agents have limited context windows, and excessive tool definitions can degrade the agent''s ability to select the correct
  tool, leading to unintended actions. Additionally, reviewing the security posture of dozens or hundreds of tools becomes
  impractical, increasing the likelihood that vulnerable or malicious tools go undetected.

  '
remediation: '1. Reduce the number of exposed tools by splitting the server into multiple focused servers with clear responsibilities.

  2. Use tool namespacing to organize related tools.

  3. Implement dynamic tool registration that only exposes tools relevant to the current context or user permissions.

  4. Review and remove deprecated or redundant tools regularly.'
references:
- https://owasp.org/www-project-mcp-top-10/
- https://modelcontextprotocol.io/specification/2025-03-26/server/tools
owasp_mcp:
- MCP01:2025
