check_id: agent027
title: Detect delegation tools without depth limits
category: agentic_behavior
severity: high
description: >-
  Detects tools with delegation keywords such as delegate, orchestrate, chain,
  and spawn in their name or description without corresponding depth or iteration
  limits in the server configuration. Delegation tools without bounds create
  infinite delegation chain risks.
risk_explanation: >-
  Delegation tools that can invoke other tools or agents without depth limits
  create a risk of infinite delegation chains. An attacker could craft inputs
  that cause recursive delegation, leading to resource exhaustion, denial of
  service, or unbounded autonomous behavior that escapes human oversight.
remediation: >-
  1. Configure max_depth or max_iterations limits in the server configuration.
  2. Implement circuit breakers that halt delegation after a configurable number of steps.
  3. Add timeout configuration to prevent runaway delegation chains.
  4. Monitor delegation depth at runtime and alert on excessive chaining.
references:
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP07:2025
tags:
  - delegation
  - depth_limit
  - infinite_loop
  - agentic_safety
