check_id: agent005
title: Ensure Authorization is configured for Delegation
category: agentic_behavior
severity: high
description: Checks for MCP configurations where one LLM agent can delegate tasks to other agents or sub-agents without proper
  authorization checks. In multi-agent architectures, delegation without authorization allows a compromised agent to leverage
  other agents' capabilities and access rights.
risk_explanation: 'Unauthorized delegation in multi-agent MCP systems allows a compromised or manipulated agent to recruit
  other agents to perform actions on its behalf. The delegated agents may have different permission sets, access to different
  MCP servers, or higher privilege levels. This creates a privilege escalation path where a low-privilege agent can achieve
  high-privilege outcomes by delegating to more capable agents without proper authorization verification.

  '
remediation: '1. Implement authorization checks for all agent delegation requests.

  2. Verify that the delegating agent has permission to request the specific actions being delegated.

  3. Maintain delegation chains and enforce depth limits.

  4. Require the same user approval for delegated actions as for directly invoked actions.

  5. Log all delegation events including the delegating agent, target agent, and requested actions.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
