check_id: agent007
title: Ensure protection against Agent Memory poisoning
category: agentic_behavior
severity: high
description: Checks for MCP configurations where agent memory, state, or context can be corrupted through tool outputs, sampling
  responses, or direct state manipulation. Poisoned agent memory leads to incorrect decisions in subsequent interactions and
  can persist across conversation turns.
risk_explanation: 'Agent memory poisoning corrupts the information the LLM agent relies on for decision-making. By injecting
  false information into the agent''s context through carefully crafted tool outputs, an attacker can cause the agent to believe
  false facts, trust malicious servers, ignore warnings, or follow attacker-supplied instructions. Poisoned memory persists
  across conversation turns, making the effects cumulative and increasingly severe over time.

  '
remediation: '1. Implement memory integrity checks that validate agent context against known facts and user-confirmed information.

  2. Isolate tool outputs from the agent''s core memory using trust boundaries.

  3. Apply content filtering to tool outputs before they are incorporated into agent context.

  4. Provide users with visibility into the agent''s current context and memory state.

  5. Implement periodic memory validation and cleanup.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
