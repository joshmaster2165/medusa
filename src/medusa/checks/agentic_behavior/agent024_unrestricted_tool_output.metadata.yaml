check_id: agent024
title: Unrestricted Tool Output
category: agentic_behavior
severity: medium
description: >
  Detects tools that have no output schema or size constraints, allowing
  unlimited data return. Unrestricted output can be used for data
  exfiltration or context flooding. Only flags tools classified as
  READ_ONLY or EXFILTRATIVE by risk analysis, since these are the tools
  most likely to return large data volumes.
risk_explanation: >
  Tools without output constraints can return unbounded amounts of data,
  potentially overwhelming the LLM context window, causing denial of
  service, or injecting malicious content into the conversation. A
  compromised tool could exploit unrestricted output to perform prompt
  injection attacks by embedding instructions in large responses.
  Data-reading and exfiltrative tools without output schemas are
  particularly concerning as they may inadvertently expose sensitive
  information at scale.
remediation: >
  Define output schemas for all tools, especially those that read or
  export data. Implement output size limits and pagination for tools
  that return collections. Use streaming for large outputs and set
  maximum response sizes. Consider adding result count limits as
  required parameters for data-querying tools.
references:
  - "https://owasp.org/www-project-mcp-top-10/"
  - "https://modelcontextprotocol.io/specification/2025-03-26/server/tools"
owasp_mcp:
  - "MCP01:2025"
tags:
  - agentic_behavior
  - output_validation
  - data_exfiltration
