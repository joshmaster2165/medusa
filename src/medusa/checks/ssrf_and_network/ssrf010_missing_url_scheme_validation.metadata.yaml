check_id: ssrf010
title: Ensure URL Scheme Validation is configured
category: ssrf_and_network
severity: info
description: Checks the MCP server for tools that accept URLs without validating the URL scheme or protocol. Without scheme
  validation, attackers can use non- HTTP protocols such as file://, gopher://, dict://, or ftp:// to access local files,
  interact with internal services, or bypass network-level protections.
risk_explanation: 'Missing URL scheme validation in MCP tools opens the door to numerous attack vectors beyond standard HTTP
  SSRF. The file:// scheme enables reading local files including credentials and configuration. The gopher:// scheme enables
  arbitrary protocol interaction with internal services. The dict:// scheme enables dictionary-based service probing. Each
  non-HTTP scheme provides unique exploitation capabilities.

  '
remediation: '1. Implement strict URL scheme validation that only permits https:// and optionally http:// for MCP tool requests.

  2. Reject all other URL schemes including file://, ftp://, gopher://, dict://, ldap://, and data://.

  3. Apply scheme validation before any URL parsing or processing.

  4. Use URL parsing libraries that enforce scheme restrictions consistently.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
