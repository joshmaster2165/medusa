check_id: ssrf011
title: Ensure Egress Allowlist is configured
category: ssrf_and_network
severity: info
description: Verifies that the MCP server has an explicit allowlist of permitted external destinations for tool-initiated
  network requests. Without an egress allowlist, tools can contact any external service, making it difficult to detect and
  prevent data exfiltration or unauthorized API calls.
risk_explanation: 'Without an egress allowlist, MCP tools can communicate with any external endpoint. This makes data exfiltration
  trivial since a compromised tool can send sensitive data to any attacker-controlled server. It also prevents organizations
  from maintaining an inventory of external dependencies and makes it impossible to detect anomalous outbound traffic from
  MCP tools.

  '
remediation: '1. Define and enforce an explicit egress allowlist for all MCP tool network requests.

  2. The allowlist should specify permitted domains, IP ranges, and ports.

  3. Implement the allowlist at both the application level (URL validation) and the network level (firewall rules or proxy
  configuration).

  4. Review and update the allowlist regularly.

  5. Log all blocked egress attempts for security monitoring.'
references:
- https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
- MCP05:2025
tags:
- ssrf
- network_security
applicable_transports:
