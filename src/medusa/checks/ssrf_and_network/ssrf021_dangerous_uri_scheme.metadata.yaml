check_id: ssrf021
title: Detect dangerous URI scheme references in tool metadata
category: ssrf_and_network
severity: critical
description: >-
  Detects references to dangerous URI schemes such as file://, gopher://,
  dict://, ftp://, ldap://, and tftp:// in tool descriptions, parameter
  descriptions, or default values. These schemes can enable local file access,
  protocol-level attacks, or server-side request forgery.
risk_explanation: >-
  Dangerous URI schemes in tool metadata can be exploited for SSRF attacks.
  The file:// scheme enables local file system access, gopher:// allows
  arbitrary protocol interactions, and ldap:// can be used for LDAP injection.
  These schemes have no legitimate purpose in standard MCP tool metadata and
  indicate potential attack vectors.
remediation: >-
  1. Remove all dangerous URI scheme references from tool descriptions and defaults.
  2. Implement URI scheme allowlisting that only permits https:// and http://.
  3. Validate all URL parameters against a safe scheme allowlist.
  4. Use network-level controls to block non-HTTP protocol requests.
references:
  - https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP05:2025
tags:
  - ssrf
  - dangerous_scheme
  - protocol_smuggling
  - uri_scheme
