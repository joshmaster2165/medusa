check_id: ssrf022
title: Detect internal service hostname references in tool metadata
category: ssrf_and_network
severity: high
description: >-
  Detects references to internal service hostnames such as .internal, .local,
  and .svc.cluster.local in tool descriptions, parameter descriptions, or
  default values. Internal hostnames in tool metadata exposed to LLMs may
  enable internal network reconnaissance and SSRF attacks.
risk_explanation: >-
  Internal service hostnames in tool metadata can reveal internal network
  topology to LLMs. When these hostnames appear in tool descriptions or
  defaults, they may be used by the model to construct requests targeting
  internal services that should not be accessible from the MCP boundary.
remediation: >-
  1. Remove all internal hostname references from tool descriptions and defaults.
  2. Use external-facing hostnames or abstract service identifiers in tool metadata.
  3. Implement network segmentation to prevent MCP tools from reaching internal services.
  4. Audit tool metadata for any references to internal infrastructure.
references:
  - https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
  - https://owasp.org/www-project-mcp-top-10/
owasp_mcp:
  - MCP05:2025
tags:
  - ssrf
  - internal_network
  - service_discovery
  - hostname_leak
